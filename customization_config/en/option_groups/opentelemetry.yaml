# OpenTelemetry API Support option groups

otel_api_support_language_options:
  - id: java
    default: true
  - id: python
  - id: node_js
  - id: go
  - id: ruby
  - id: dot_net
  - id: php
  - id: rust

otel_api_support_signal_options:
  - id: traces
    default: true
  - id: metrics
  - id: logs

ddot_collector_deployment_options:
  - id: kubernetes_daemonset
    default: true
  - id: kubernetes_gateway
  - id: linux
  - id: ecs_fargate
  - id: eks_fargate
