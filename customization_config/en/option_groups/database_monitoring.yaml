# Database Monitoring option groups
# Used by /database_monitoring/setup_agent_terraform/

dbm_database_options:
  - id: postgres
    default: true

dbm_db_hosting_options:
  - id: rds
    default: true
  - id: aurora
  - id: self_hosted

dbm_agent_runtime_options:
  - id: ecs_fargate
    default: true
  - id: amazon_eks
  - id: amazon_ec2
