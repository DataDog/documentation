<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <title>Marginal pricing across volume tiers</title>

  <!-- Page title -->
  <text x="600" y="40" text-anchor="middle" font-size="22" font-weight="700" fill="#1e293b">Marginal pricing across volume tiers</text>

  <!-- Subtitle -->
  <text x="600" y="68" text-anchor="middle" font-size="14" fill="#475569">Higher-volume tiers have lower per-unit rates.</text>

  <!-- Y-axis label (rotated, centered vertically alongside the chart) -->
  <text x="55" y="210" text-anchor="middle" font-size="14" font-weight="600" fill="#475569" transform="rotate(-90, 55, 210)">Per-unit rate</text>

  <!-- Stepped tier bars, bottoms aligned at the baseline (y=310) -->
  <!-- T1 highest rate, T5 lowest rate -->
  <rect x="100" y="110" width="200" height="200" fill="#0d9488"/>
  <rect x="300" y="140" width="200" height="170" fill="#0d9488"/>
  <rect x="500" y="170" width="200" height="140" fill="#0d9488"/>
  <rect x="700" y="200" width="200" height="110" fill="#0d9488"/>
  <rect x="900" y="230" width="200" height="80" fill="#0d9488"/>

  <!-- Thin separators between bars to make tier boundaries crisp -->
  <line x1="300" y1="140" x2="300" y2="310" stroke="#ffffff" stroke-width="1.5"/>
  <line x1="500" y1="170" x2="500" y2="310" stroke="#ffffff" stroke-width="1.5"/>
  <line x1="700" y1="200" x2="700" y2="310" stroke="#ffffff" stroke-width="1.5"/>
  <line x1="900" y1="230" x2="900" y2="310" stroke="#ffffff" stroke-width="1.5"/>

  <!-- Tier labels inside each bar, vertically centered for that bar -->
  <text x="200" y="218" text-anchor="middle" font-size="22" font-weight="700" fill="#ffffff">T1</text>
  <text x="400" y="233" text-anchor="middle" font-size="22" font-weight="700" fill="#ffffff">T2</text>
  <text x="600" y="248" text-anchor="middle" font-size="22" font-weight="700" fill="#ffffff">T3</text>
  <text x="800" y="263" text-anchor="middle" font-size="22" font-weight="700" fill="#ffffff">T4</text>
  <text x="1000" y="278" text-anchor="middle" font-size="22" font-weight="700" fill="#ffffff">T5</text>

  <!-- X-axis baseline -->
  <line x1="100" y1="310" x2="1100" y2="310" stroke="#475569" stroke-width="1.5"/>

  <!-- X-axis label -->
  <text x="600" y="345" text-anchor="middle" font-size="14" font-weight="600" fill="#475569">Volume →</text>

</svg>
