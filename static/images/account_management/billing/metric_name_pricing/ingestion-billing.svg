<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 510" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <title>Ingestion billing under Metric Name pricing</title>

  <!-- Page title -->
  <text x="600" y="40" text-anchor="middle" font-size="22" font-weight="700" fill="#1e293b">Ingestion billing under Metric Name pricing</text>

  <!-- ============================================ -->
  <!-- Section 1: Ingested volume bar (top)         -->
  <!-- ============================================ -->

  <text x="100" y="85" font-size="14" font-weight="600" fill="#1e293b">Ingested volume (every datapoint your services submit)</text>

  <!-- Bar fills with clipped corners -->
  <defs>
    <clipPath id="ingested-clip">
      <rect x="100" y="100" width="1000" height="90" rx="8" ry="8"/>
    </clipPath>
  </defs>
  <g clip-path="url(#ingested-clip)">
    <rect x="100" y="100" width="700" height="90" fill="#bbf7d0"/>
    <rect x="800" y="100" width="300" height="90" fill="#fed7aa"/>
  </g>

  <!-- Segment dividers inside the free zone (five 140-wide segments matching indexed bar width) -->
  <line x1="240" y1="100" x2="240" y2="190" stroke="#4ade80" stroke-width="1"/>
  <line x1="380" y1="100" x2="380" y2="190" stroke="#4ade80" stroke-width="1"/>
  <line x1="520" y1="100" x2="520" y2="190" stroke="#4ade80" stroke-width="1"/>
  <line x1="660" y1="100" x2="660" y2="190" stroke="#4ade80" stroke-width="1"/>

  <!-- Free / billable divider (strong) -->
  <line x1="800" y1="100" x2="800" y2="190" stroke="#475569" stroke-width="1.5"/>

  <!-- Outer bar border -->
  <rect x="100" y="100" width="1000" height="90" rx="8" ry="8" fill="none" stroke="#475569" stroke-width="1.5"/>

  <!-- Segment labels: 1×, 2×, 3×, 4×, 5× -->
  <text x="170" y="153" text-anchor="middle" font-size="18" font-weight="700" fill="#166534">1×</text>
  <text x="310" y="153" text-anchor="middle" font-size="18" font-weight="700" fill="#166534">2×</text>
  <text x="450" y="153" text-anchor="middle" font-size="18" font-weight="700" fill="#166534">3×</text>
  <text x="590" y="153" text-anchor="middle" font-size="18" font-weight="700" fill="#166534">4×</text>
  <text x="730" y="153" text-anchor="middle" font-size="18" font-weight="700" fill="#166534">5×</text>

  <!-- Position ticks and labels just below the bar -->
  <line x1="100" y1="190" x2="100" y2="204" stroke="#64748b" stroke-width="1"/>
  <text x="100" y="222" text-anchor="middle" font-size="12" fill="#475569">0</text>

  <line x1="800" y1="190" x2="800" y2="204" stroke="#64748b" stroke-width="1"/>
  <text x="800" y="222" text-anchor="middle" font-size="12" fill="#475569">5 × indexed</text>

  <line x1="1100" y1="190" x2="1100" y2="204" stroke="#64748b" stroke-width="1"/>
  <text x="1100" y="222" text-anchor="middle" font-size="12" fill="#475569">Total ingested</text>

  <!-- Span brackets below the position labels -->
  <!-- Free ingest bracket (spans all five 1×–5× segments) -->
  <path d="M 100 240 L 100 248 L 800 248 L 800 240" stroke="#475569" stroke-width="1.5" fill="none"/>
  <text x="450" y="270" text-anchor="middle" font-size="14" font-weight="600" fill="#166534">Free ingestion</text>

  <!-- Billable overage bracket -->
  <path d="M 800 240 L 800 248 L 1100 248 L 1100 240" stroke="#475569" stroke-width="1.5" fill="none"/>
  <text x="950" y="270" text-anchor="middle" font-size="14" font-weight="600" fill="#9a3412">Billable overage</text>
  <text x="950" y="287" text-anchor="middle" font-size="11" fill="#9a3412">(above 5× indexed)</text>

  <!-- ============================================ -->
  <!-- Alignment indicators between bars             -->
  <!-- ============================================ -->

  <!-- Thin teal dashed lines connecting the leftmost free segment to the indexed bar -->
  <line x1="100" y1="305" x2="100" y2="345" stroke="#0d9488" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="240" y1="305" x2="240" y2="345" stroke="#0d9488" stroke-width="1" stroke-dasharray="3 3"/>

  <!-- ============================================ -->
  <!-- Section 2: Indexed volume bar (bottom)       -->
  <!-- Same height as the ingested bar for direct proportional comparison -->
  <!-- ============================================ -->

  <rect x="100" y="345" width="140" height="90" rx="8" ry="8" fill="#0d9488"/>
  <text x="170" y="398" text-anchor="middle" font-size="18" font-weight="700" fill="#ffffff">1×</text>

  <!-- Side caption for the indexed bar (single inline line, format-matched to the Ingested header) -->
  <text x="260" y="395" font-size="14" font-weight="600" fill="#1e293b">Indexed volume (queryable subset, based on tag configuration)</text>

  <!-- Position ticks and labels below the indexed bar -->
  <line x1="100" y1="435" x2="100" y2="448" stroke="#64748b" stroke-width="1"/>
  <text x="100" y="465" text-anchor="middle" font-size="12" fill="#475569">0</text>

  <line x1="240" y1="435" x2="240" y2="448" stroke="#64748b" stroke-width="1"/>
  <text x="240" y="465" text-anchor="middle" font-size="12" fill="#475569">Indexed</text>

</svg>
