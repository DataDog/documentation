<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <title>HMI billing under Metric Name pricing</title>

  <!-- Page title -->
  <text x="600" y="40" text-anchor="middle" font-size="22" font-weight="700" fill="#1e293b">HMI billing under Metric Name pricing</text>

  <!-- ============================================ -->
  <!-- Ingested volume bar (top) — full canvas width -->
  <!-- ============================================ -->

  <text x="100" y="85" font-size="14" font-weight="600" fill="#1e293b">Ingested volume (every HMI datapoint your services submit)</text>

  <rect x="100" y="100" width="1000" height="80" rx="8" ry="8" fill="#0d9488"/>
  <text x="600" y="148" text-anchor="middle" font-size="20" font-weight="700" fill="#ffffff">N datapoints</text>

  <!-- ============================================ -->
  <!-- 1:1 ratio pill, centered between bars         -->
  <!-- ============================================ -->

  <rect x="555" y="200" width="90" height="26" rx="13" fill="#ffffff" stroke="#0d9488" stroke-width="1.5"/>
  <text x="600" y="219" text-anchor="middle" font-size="14" font-weight="700" fill="#0d9488">1 : 1</text>

  <!-- ============================================ -->
  <!-- Indexed volume bar (bottom) — same width as ingested -->
  <!-- ============================================ -->

  <text x="100" y="245" font-size="14" font-weight="600" fill="#1e293b">Indexed volume (queryable subset, based on tag configuration)</text>

  <rect x="100" y="260" width="1000" height="80" rx="8" ry="8" fill="#0d9488"/>
  <text x="600" y="308" text-anchor="middle" font-size="20" font-weight="700" fill="#ffffff">N datapoints</text>

</svg>
