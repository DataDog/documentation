heading: Bienvenue dans la documentation de Datadog !

guides:
    # There can be only 3 guides in this section
  - title: "Installation de l'Agent"
    desc: Recueillez des événements et des métriques à partir de vos hosts qui transmettent des données à Datadog.
    link_text: "Débuter avec l'Agent"
    link: getting_started/agent/
  - title: Configurer des intégrations
    desc: "Rassemblez des métriques, des traces et des journaux avec plus de 1 000 intégrations natives à envoyer à Datadog."
    link_text: Débuter avec les intégrations
    link: getting_started/integrations/
  - title: Débuter avec Datadog
    desc: "Visualisez les données recueillies dans Datadog et créez des dashboards, des alertes, des monitors, et plus encore."
    link_text: Débuter avec Datadog
    link: getting_started/application/

nav_sections:
    # For a better rendering, sections should include sub-sections with multiple of 4.
  - nav_section:
    - name: 'Observability'
    - navtiles:
      - title: Infrastructure
        link: infrastructure/
        icon: host-map
        desc: "Visualisez la santé et la performance de vos hôtes et composants d'infrastructure."
      - title: Metrics
        link: metrics/
        icon: metric
        desc: "Explorez, recherchez et créez des distributions pour vos métriques."
      - title: Surveillance des conteneurs
        link: containers/
        icon: container
        desc: "Surveillez la santé, la performance et la sécurité de vos environnements conteneurisés."
      - title: Environnement sans serveur
        link: serverless/
        icon: serverless
        desc: Détectez et résolvez les problèmes de performance de vos applications sans serveur.
      - title: Surveillance réseau
        link: network_monitoring/
        icon: network
        desc: Utilisez des objets tagués pour recueillir et représenter des données à propos de votre trafic réseau.
      - title: Cloud Cost Management
        link: cloud_cost_management/
        icon: cloud-cost-management
        desc: "Maîtrisez vos dépenses liées au cloud avec l'observabilité unifiée et les données de coût."
      - title: Cloudcraft
        link: cloudcraft/
        icon: cloudcraft
        desc: Visualisez et schématisez votre infrastructure cloud en temps réel
      - title: Gestion du stockage.
        link: infrastructure/storage_management/
        icon: file-wui
        desc: "Optimisez et dépannez vos dépenses, votre utilisation et la fraîcheur des données de stockage cloud."
      - title: APM
        link: tracing/
        icon: apm
        desc: "Explorez des dashboards prêts à l'emploi sur les performances et activez le tracing distribué."
      - title: Universal Service Monitoring
        link: universal_service_monitoring/
        icon: usm
        desc: "Découvrez, mappez et surveillez des services sans modification du code."
      - title: Profiler en continu
        link: profiler/
        icon: profiling-1
        desc: "Comparez des snapshots des performances et analysez les goulots d'étranglement."
      - title: Database Monitoring
        link: database_monitoring/
        icon: database-2
        desc: "Parcourez des dashboards enrichis, des métriques de requête et des échantillons de requêtes."
      - title: Data Streams Monitoring
        link: data_streams/
        icon: datastreams-monitoring
        desc: Surveillez et optimisez les performances de vos pipelines de diffusion de données.
      - title: Observabilité des données.
        link: data_observability/
        icon: data-observability-wui
        desc: "Surveillez la qualité des données, la performance et le coût pour détecter les anomalies et prévenir les problèmes en aval."
      - title: Log Management
        link: logs/
        icon: log
        desc: "Traitez, surveillez et archivez vos logs ingérés."
      - title: Scanner de données sensibles
        link: security/sensitive_data_scanner/
        icon: sensitive-data-scanner
        desc: "Détectez et masquez les données sensibles telles que les informations personnelles identifiables, les clés API et les numéros de carte de crédit dans votre télémétrie."
      - title: "Pipelines d'observabilité"
        link: observability_pipelines/
        icon: pipelines
        desc: Gérez et surveillez vos pipelines de télémétrie.
      - title: Suivi des erreurs
        link: error_tracking/
        icon: error-tracking
        desc: "Identifiez les erreurs critiques et accélérez la résolution sur le web, mobile et backend."
  - nav_section:
    - name: 'AI'
    - navtiles:
      - title: Bits AI Agents
        link: bits_ai/
        icon: bits-ai
        desc: "Votre collègue automatisé qui gère les flux de travail de développement, de sécurité et opérationnels"
      - title: Watchdog
        link: watchdog/
        icon: watchdog
        desc: Détectez et visualisez des anomalies liées à vos applications et votre infrastructure.
      - title: LLM Observability
        link: llm_observability/
        icon: llm-observability
        desc: "Tracez, surveillez et sécurisez vos applications LLM."
  - nav_section:
    - name: 'Digital Experience'
    - navtiles:
      - title: Real User Monitoring
        link: real_user_monitoring/
        icon: rum
        desc: "Enregistrez, observez et analysez l'expérience utilisateur de vos applications."
      - title: Analyse des produits
        link: product_analytics/
        icon: product-analytics
        desc: Obtenez des informations pertinentes sur le comportement de vos utilisateurs et prenez des décisions éclairées pour vos produits.
      - title: Session Replay
        link: session_replay/
        icon: session-replay
        desc: "Capturez et rejouez visuellement l'expérience utilisateur"
      - title: Surveillance Synthetics
        link: synthetics/
        icon: synthetics
        desc: "Vérifiez la disponibilité de vos services, identifiez les problèmes régionaux et testez les performances de vos applications."
      - title: "Tests d'application mobile"
        link: mobile_app_testing/
        icon: mobile
        desc: Surveillez des parcours utilisateur et des transactions opérationnelles dans des applications mobiles.
  - nav_section:
    - name: 'Software Delivery'
    - navtiles:
      - title: Portail développeur interne.
        link: internal_developer_portal/
        icon: internal-developer-portal-wui
        desc: "Unifiez la télémétrie, les métadonnées et les flux de travail pour accélérer la livraison."
      - title: Visibilité CI
        link: continuous_integration/
        icon: ci
        desc: Surveillez les performances et la santé de vos pipelines de CI.
      - title: Optimisation des tests.
        link: tests/
        icon: flaky-test-wui
        desc: Détecter les tests défaillants et identifier les commits introduisant des tests défaillants
      - title: Tests continus
        link: continuous_testing/
        icon: continuous-testing
        desc: Mettez en place des intégrations sans code et des tests en continu grâce aux fournisseurs CI/CD.
      - title: Plugins IDE
        link: ide_plugins/
        icon: ide
        desc: Interagissez avec les services Datadog directement depuis votre IDE pendant que vous codez.
      - title: Métriques DORA
        link: dora_metrics/
        icon: ci
        desc: Mesurez et améliorez les processus de livraison de logiciels de votre organisation.
      - title: Feature Flags
        link: feature_flags/
        icon: signpost
        desc: "Activez des fonctionnalités, effectuez des tests A/B et déployez progressivement des fonctionnalités sans déploiement de code"
      - title: Couverture du code
        link: code_coverage/
        icon: code-3
        desc: Visualisez les tendances des données de couverture et bloquez les fusions de PR en fonction des seuils de couverture
  - nav_section:
    - name: 'Security'
    - navtiles:
      - title: Cloud SIEM
        link: security/cloud_siem/
        icon: siem
        desc: "Détectez, enquêtez et répondez aux menaces de sécurité sur vos systèmes cloud et sur site"
      - title: Sécurité du code
        link: security/code_security/
        icon: security-code-security
        desc: "Détectez et corrigez les vulnérabilités dans votre code, vos dépendances et votre infrastructure en tant que code"
      - title: Cloud Security
        link: security/cloud_security_management/
        icon: cloud-security-management
        desc: "Auditez en continu les configurations, évaluez les risques d'identité et détectez les menaces sur votre infrastructure cloud"
      - title: Protection des applications et des API
        link: security/application_security/
        icon: app-sec
        desc: Détectez et bloquez les menaces ciblant vos applications de production et vos API en temps réel
      - title: Protection des charges de travail
        link: security/workload_protection/
        icon: security-workload-security
        desc: "Surveillez l'activité des fichiers, du réseau et des processus pour détecter les menaces en temps réel sur votre infrastructure"
      - title: Scanner de données sensibles
        link: security/sensitive_data_scanner/
        icon: sensitive-data-scanner
        desc: "Détectez et masquez les données sensibles telles que les informations personnelles identifiables, les clés API et les numéros de carte de crédit dans votre télémétrie."
  - nav_section:
    - name: 'Service Management'
    - navtiles:
      - title: Gestion des incidents
        link: service_management/incident_management
        icon: incidents
        desc: "Identifier, analyser et atténuer les incidents perturbateurs dans votre organisation"
      - title: En astreinte
        link: incident_response/on-call/
        icon: on-call
        desc: "Dirigez et escaladez les alertes vers les membres appropriés de l'équipe grâce aux plannings d'astreinte et au paging"
      - title: Pages de statut
        link: incident_response/status_pages/
        icon: status-page-wui
        desc: Communiquez la disponibilité des services et les mises à jour des incidents à vos utilisateurs et parties prenantes
      - title: Service Level Objectives
        link: service_level_objectives/
        icon: slos
        desc: Définissez et suivez les objectifs de performance pour offrir une expérience client cohérente
      - title: Gestion des cas
        link: incident_response/case_management/
        icon: case-management
        desc: "Priorisez, suivez et résolvez les problèmes grâce à une gestion centralisée et une collaboration d'équipe"
      - title: Workflow Automation
        link: service_management/workflows/
        icon: workflows
        desc: Automatisez et orchestrez des processus dans toute votre pile technologique.
      - title: App Builder
        link: service_management/app_builder/
        icon: app-builder
        desc: Créez des applications low-code pour rationaliser vos outils internes
  - nav_section:
    - name: 'Platform Capabilities and Extending Datadog'
    - navtiles:
      - title: Monitors et alertes
        link: monitors/
        icon: monitor
        desc: "Créez, modifiez et gérez vos monitors et notifications."
      - title: Dashboards
        link: dashboards/
        icon: dashboard
        desc: "Visualisez, analysez et générez des insights à propos de vos données."
      - title: Notebooks
        link: notebooks/
        icon: notebook
        desc: "Créez des documents en texte enrichi avec des graphiques en direct pour les investigations, les postmortems et les runbooks"
      - title: Application mobile
        link: mobile/
        icon: mobile
        desc: "Consultez les alertes, les incidents et d'autres insights Datadog depuis votre appareil mobile."
      - title: Fleet Automation
        link: agent/fleet_automation/
        icon: fleet-automation-wui
        desc: "Configurez, mettez à niveau et gérez vos Agents à distance à grande échelle"
      - title: Gestion de compte
        link: account_management/
        icon: cog-2
        desc: "Gérez les paramètres basés sur l'organisation, la facturation et les contrôles d'accès aux données"
      - title: Gestion des événements
        link: events/
        icon: events
        desc: Recevez une alerte en cas de changement important dans vos applications et votre infrastructure.
      - title: CoScreen
        link: coscreen/
        icon: coscreen
        desc: "Partagez et interagissez avec les fenêtres d'application pour la programmation en binôme et la gestion des incidents"
      - title: OpenTelemetry
        link: opentelemetry/
        icon: open-telemetry
        desc: "Acheminez vos métriques, logs et traces OpenTelemetry vers Datadog."
      - title: Les intégrations
        link: integrations/
        icon: integrations
        desc: "Recueillez des données à propos de vos applications, services et systèmes."
      - title: API
        link: api/latest/
        icon: api
        desc: "Testez l'API Datadog."
      - title: Sécurité des données
        link: data_security/
        icon: security-lock
        desc: Découvrez comment Datadog protège vos données.
      - title: Client SDKs
        link: client_sdks/
        icon: building-block
        desc: Installez et configurez le SDK Datadog pour votre plateforme
      - title: Étendez Datadog
        link: extend/
        icon: dev-code
        desc: Étendez la plateforme Datadog
      - title: Partenaires
        link: partners/
        icon: colab
        desc: Découvrez les meilleures pratiques et commencez à surveiller les environnements de vos clients.

