heading: ¡Bienvenido a la documentación de Datadog!

guides:
    # There can be only 3 guides in this section
  - title: Instalar el Agente
    desc: Recopila eventos y métricas de tus servidores que envían datos a Datadog.
    link_text: Introducción al Agente
    link: getting_started/agent/
  - title: Configurar Integraciones
    desc: "Reúne métricas, trazas y registros con más de 1,000 integraciones incorporadas para enviar a Datadog."
    link_text: Introducción a las Integraciones
    link: getting_started/integrations/
  - title: Comenzar en la Aplicación
    desc: "Visualiza los datos recopilados en Datadog y crea dashboards, alertas, monitors y más."
    link_text: Introducción a Datadog
    link: getting_started/application/

nav_sections:
    # For a better rendering, sections should include sub-sections with multiple of 4.
  - nav_section:
    - name: 'Observability'
    - navtiles:
      - title: Infraestructura
        link: infrastructure/
        icon: host-map
        desc: Visualiza la salud y el rendimiento de tus servidores y componentes de infraestructura
      - title: Métricas
        link: metrics/
        icon: metric
        desc: "Explora, busca y crea distribuciones para tus métricas"
      - title: Container Monitoring
        link: containers/
        icon: container
        desc: "Monitorea la salud, el rendimiento y la seguridad de tus entornos en contenedores"
      - title: Serverless
        link: serverless/
        icon: serverless
        desc: Detecta y resuelve problemas de rendimiento en tus aplicaciones sin servidor
      - title: Network Monitoring
        link: network_monitoring/
        icon: network
        desc: Utiliza objetos etiquetados para recopilar y graficar datos sobre tu tráfico de red
      - title: Cloud Cost Management
        link: cloud_cost_management/
        icon: cloud-cost-management
        desc: Toma el control de tu gasto en la nube con observabilidad unificada y datos de costos.
      - title: Cloudcraft
        link: cloudcraft/
        icon: cloudcraft
        desc: Visualice y diagrama su infraestructura en la nube en tiempo real
      - title: Gestión de Almacenamiento
        link: infrastructure/storage_management/
        icon: file-wui
        desc: "Optimiza y soluciona problemas relacionados con el gasto, uso y frescura de datos en el almacenamiento en la nube."
      - title: APM
        link: tracing/
        icon: apm
        desc: Explora dashboards de rendimiento listos para usar y trazas distribuidas.
      - title: Universal Service Monitoring
        link: universal_service_monitoring/
        icon: usm
        desc: "Descubre, mapea y monitorea servicios sin cambiar el código."
      - title: Continuous Profiler
        link: profiler/
        icon: profiling-1
        desc: Compara instantáneas de rendimiento e investiga cuellos de botella.
      - title: Database Monitoring
        link: database_monitoring/
        icon: database-2
        desc: "Explora dashboards enriquecidos, métricas de consultas y muestras de consulta."
      - title: Data Streams Monitoring
        link: data_streams/
        icon: datastreams-monitoring
        desc: Rastrea y mejora el rendimiento de tus canalizaciones de transmisión de datos.
      - title: Data Observability
        link: data_observability/
        icon: data-observability-wui
        desc: "Monitorea la calidad de los datos, el rendimiento y el costo para detectar anomalías y prevenir problemas posteriores."
      - title: Log Management
        link: logs/
        icon: log
        desc: "Procesa, monitorea y archiva tus registros ingeridos."
      - title: Sensitive Data Scanner
        link: security/sensitive_data_scanner/
        icon: sensitive-data-scanner
        desc: "Detecta y oculta datos sensibles como PII, claves de API y números de tarjetas de crédito en tu telemetría"
      - title: Observability Pipelines
        link: observability_pipelines/
        icon: pipelines
        desc: Gestiona y monitorea tus canalizaciones de telemetría.
      - title: Error Tracking
        link: error_tracking/
        icon: error-tracking
        desc: "Identifica errores críticos y acelera la resolución en la web, móvil y backend"
  - nav_section:
    - name: 'AI'
    - navtiles:
      - title: Bits AI Agents
        link: bits_ai/
        icon: bits-ai
        desc: "Tu Bits AI Agent, el compañero que automatiza el desarrollo, la seguridad y los flujos operativos."
      - title: Watchdog
        link: watchdog/
        icon: watchdog
        desc: Detecta y resalta anomalías en aplicaciones e infraestructura
      - title: LLM Observability
        link: llm_observability/
        icon: llm-observability
        desc: "Rastrea, monitorea y asegura tus aplicaciones de LLM"
  - nav_section:
    - name: 'Digital Experience'
    - navtiles:
      - title: Real User Monitoring
        link: real_user_monitoring/
        icon: rum
        desc: "Captura, observa y analiza la experiencia del usuario de tus aplicaciones"
      - title: Product Analytics
        link: product_analytics/
        icon: product-analytics
        desc: Obtén información sobre el comportamiento del usuario y toma decisiones de producto basadas en datos
      - title: Reproducción de sesión
        link: session_replay/
        icon: session-replay
        desc: Captura y reproduce visualmente la experiencia de tus usuarios
      - title: Synthetic Monitoring
        link: synthetics/
        icon: synthetics
        desc: "Asegura el tiempo de actividad, señala problemas regionales y prueba el rendimiento de la aplicación"
      - title: Mobile App Testing
        link: mobile_app_testing/
        icon: mobile
        desc: Monitorea los recorridos de los usuarios y las transacciones comerciales en aplicaciones móviles.
  - nav_section:
    - name: 'Software Delivery'
    - navtiles:
      - title: Portal Interno para Desarrolladores
        link: internal_developer_portal/
        icon: internal-developer-portal-wui
        desc: "Unifica telemetría, metadatos y flujos de trabajo para acelerar la entrega."
      - title: CI Visibility
        link: continuous_integration/
        icon: ci
        desc: Monitorea la salud y el rendimiento de tus canalizaciones de CI
      - title: Test Optimization
        link: tests/
        icon: flaky-test-wui
        desc: Detecta pruebas inestables e identifica los commits que introducen pruebas inestables.
      - title: Continuous Testing
        link: continuous_testing/
        icon: continuous-testing
        desc: Realiza pruebas de integración sin código y pruebas de extremo a extremo con proveedores de CI/CD.
      - title: IDE Plugins
        link: ide_plugins/
        icon: ide
        desc: Interactúa con los servicios de Datadog directamente desde tu IDE mientras codificas
      - title: DORA Metrics
        link: dora_metrics/
        icon: ci
        desc: Mide y mejora los procesos de entrega de software de tu organización
      - title: Feature Flags
        link: feature_flags/
        icon: signpost
        desc: "Activa funciones, realiza pruebas A/B y despliega funcionalidad gradualmente sin implementaciones de código."
      - title: Code Coverage
        link: code_coverage/
        icon: code-3
        desc: Visualiza tendencias de datos de cobertura y bloquea fusiones de PR basadas en umbrales de cobertura.
  - nav_section:
    - name: 'Security'
    - navtiles:
      - title: Cloud SIEM
        link: security/cloud_siem/
        icon: siem
        desc: "Detecta, investiga y responde a amenazas de seguridad en tus sistemas en la nube y locales."
      - title: Code Security
        link: security/code_security/
        icon: security-code-security
        desc: "Detecta y corrige vulnerabilidades en tu código, dependencias e infraestructura como código."
      - title: Cloud Security
        link: security/cloud_security_management/
        icon: cloud-security-management
        desc: "Audita continuamente las configuraciones, evalúa riesgos de identidad y detecta amenazas en tu infraestructura en la nube."
      - title: Protección de Aplicaciones y API
        link: security/application_security/
        icon: app-sec
        desc: Detecta y bloquea amenazas que afectan tus aplicaciones de producción y API en tiempo real.
      - title: Workload Protection
        link: security/workload_protection/
        icon: security-workload-security
        desc: "Monitorea la actividad de archivos, red y procesos para detectar amenazas en tiempo real en tu infraestructura."
      - title: Sensitive Data Scanner
        link: security/sensitive_data_scanner/
        icon: sensitive-data-scanner
        desc: "Detecta y oculta datos sensibles, como PII, claves de API y números de tarjetas de crédito, en tu telemetría."
  - nav_section:
    - name: 'Service Management'
    - navtiles:
      - title: Incident Management
        link: service_management/incident_management
        icon: incidents
        desc: "Identifica, analiza y mitiga incidentes disruptivos en tu organización."
      - title: De guardia
        link: incident_response/on-call/
        icon: on-call
        desc: Dirige y escala alertas a los miembros adecuados del equipo con horarios de guardia y paginación.
      - title: Páginas de Estado
        link: incident_response/status_pages/
        icon: status-page-wui
        desc: Comunica la disponibilidad del servicio y actualizaciones de incidentes a tus usuarios y partes interesadas.
      - title: SLO
        link: service_level_objectives/
        icon: slos
        desc: Define y rastrea tus SLO para ofrecer una experiencia consistente al cliente.
      - title: Case Management
        link: incident_response/case_management/
        icon: case-management
        desc: "Clasifica, rastrea y remedia problemas con propiedad centralizada y colaboración del equipo."
      - title: Workflow Automation
        link: service_management/workflows/
        icon: workflows
        desc: Automatiza y orquesta procesos en tu pila tecnológica.
      - title: App Builder
        link: service_management/app_builder/
        icon: app-builder
        desc: Crea aplicaciones de bajo código para optimizar tus herramientas internas
  - nav_section:
    - name: 'Platform Capabilities and Extending Datadog'
    - navtiles:
      - title: Monitors and Alerting
        link: monitors/
        icon: monitor
        desc: "Crea, edita y gestiona tus monitors y notificaciones."
      - title: Dashboards
        link: dashboards/
        icon: dashboard
        desc: "Visualiza, analiza y genera información sobre tus datos."
      - title: Notebooks
        link: notebooks/
        icon: notebook
        desc: "Crea documentos de texto enriquecido con gráficos en vivo para investigaciones, análisis postmortem y runbooks."
      - title: Aplicación móvil
        link: mobile/
        icon: mobile
        desc: "Visualiza las alertas, incidentes y más de Datadog en tu dispositivo móvil."
      - title: Fleet Automation
        link: agent/fleet_automation/
        icon: fleet-automation-wui
        desc: "Configura, actualiza y gestiona tus Agentes de forma remota y a gran escala."
      - title: Gestión de cuentas
        link: account_management/
        icon: cog-2
        desc: "Gestiona configuraciones basadas en la organización, facturación y controles de acceso a datos."
      - title: Event Management
        link: events/
        icon: events
        desc: Rastrea cambios y alertas notables en tus aplicaciones e infraestructura.
      - title: CoScreen
        link: coscreen/
        icon: coscreen
        desc: Comparte e interactúa con ventanas de aplicaciones para programación en pareja y gestión de incidentes.
      - title: OpenTelemetry
        link: opentelemetry/
        icon: open-telemetry
        desc: "Transfiere tus métricas, registros y trazas de OpenTelemetry a Datadog."
      - title: Integraciones
        link: integrations/
        icon: integrations
        desc: "Reúne datos sobre tus aplicaciones, servicios y sistemas"
      - title: API
        link: api/latest/
        icon: api
        desc: Prueba la API de Datadog
      - title: Seguridad de Datos
        link: data_security/
        icon: security-lock
        desc: Aprende cómo Datadog protege tus datos
      - title: SDKs de Cliente
        link: client_sdks/
        icon: building-block
        desc: Instala y configura el SDK de Datadog para tu plataforma
      - title: Extiende Datadog
        link: extend/
        icon: dev-code
        desc: Extiende la plataforma de Datadog
      - title: Socios
        link: partners/
        icon: colab
        desc: Aprende sobre las mejores prácticas y comienza a monitorear los entornos de tus clientes.

