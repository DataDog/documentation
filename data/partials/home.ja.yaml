heading: Datadog について

guides:
    # There can be only 3 guides in this section
  - title: Agent のインストール
    desc: Datadog にデータを送信するホストからイベントとメトリクスを収集します。
    link_text: Agent の概要
    link: getting_started/agent/
  - title: インテグレーションをセットアップ
    desc: 800 以上のビルトインインテグレーションにより、メトリクス、トレース、ログを収集し、Datadog に送信することができます。
    link_text: インテグレーションの概要
    link: getting_started/integrations/
  - title: アプリで始める
    desc: Datadog で収集したデータを可視化し、ダッシュボード、アラート、モニターなどを作成することができます。
    link_text: Datadog の開始
    link: getting_started/application/

nav_sections:
    # For a better rendering, sections should include sub-sections with multiple of 4.
  - nav_section:
    - name: '`Observability`'
    - navtiles:
      - title: インフラストラクチャー
        link: infrastructure/
        icon: host-map
        desc: ホストとインフラストラクチャコンポーネントの健康状態とパフォーマンスを確認します
      - title: メトリクス
        link: metrics/
        icon: metric
        desc: メトリクスの探索、検索、および分布の作成
      - title: コンテナモニタリング
        link: containers/
        icon: container
        desc: コンテナ化された環境の健康状態、パフォーマンス、およびセキュリティを監視します
      - title: Serverless
        link: serverless/
        icon: serverless
        desc: サーバーレスアプリケーションにおけるパフォーマンスの問題を検出し、解決
      - title: ネットワーク監視
        link: network_monitoring/
        icon: network
        desc: タグ付きオブジェクトを使用して、ネットワークトラフィックに関するデータを収集し、グラフ化
      - title: Cloud Cost Management
        link: cloud_cost_management/
        icon: cloud-cost-management
        desc: 観測可能性とコストデータを統合し、クラウド費用をコントロールする
      - title: Cloudcraft
        link: cloudcraft/
        icon: cloudcraft
        desc: クラウドインフラストラクチャをリアルタイムで視覚化し、図示します
      - title: ストレージ管理
        link: infrastructure/storage_management/
        icon: file-wui
        desc: クラウドストレージの支出、使用状況、およびデータの新鮮さを最適化し、トラブルシューティングします
      - title: APM
        link: tracing/
        icon: apm
        desc: すぐに使えるパフォーマンスダッシュボードと分散型トレースを探る
      - title: ユニバーサル サービス モニタリング 
        link: universal_service_monitoring/
        icon: usm
        desc: コードを変更することなく、サービスを発見、マッピング、監視する
      - title: 連続プロファイラ
        link: profiler/
        icon: profiling-1
        desc: パフォーマンススナップショットの比較とボトルネックの調査
      - title: データベース モニタリング
        link: database_monitoring/
        icon: database-2
        desc: 充実したダッシュボード、クエリメトリクス、クエリサンプルを参照
      - title: データストリーム モニタリング
        link: data_streams/
        icon: datastreams-monitoring
        desc: データストリーミングパイプラインのパフォーマンスを追跡、改善
      - title: データ可観測性
        link: data_observability/
        icon: data-observability-wui
        desc: データの品質、パフォーマンス、およびコストを監視し、異常を検出して下流の問題を防ぎます
      - title: ログ管理
        link: logs/
        icon: log
        desc: 取り込んだログを処理し、監視し、アーカイブ
      - title: Sensitive Data Scanner
        link: security/sensitive_data_scanner/
        icon: sensitive-data-scanner
        desc: テレメトリ全体でPII、APIキー、クレジットカード番号などの機密データを検出し、削除します
      - title: Observability Pipelines
        link: observability_pipelines/
        icon: pipelines
        desc: テレメトリーパイプラインの管理・監視
      - title: Error Tracking
        link: error_tracking/
        icon: error-tracking
        desc: Web、モバイル、バックエンド全体で重大なエラーを特定し、解決を加速
  - nav_section:
    - name: 'AI'
    - navtiles:
      - title: Bits AIエージェント
        link: bits_ai/
        icon: bits-ai
        desc: 開発、セキュリティ、および運用ワークフローを自動化するエージェントチームメイトです
      - title: Watchdog
        link: watchdog/
        icon: watchdog
        desc: アプリケーションとインフラストラクチャーの異常を検出し、表面化する
      - title: LLM Observability
        link: llm_observability/
        icon: llm-observability
        desc: LLM アプリケーションを追跡、監視、保護する
  - nav_section:
    - name: 'デジタルエクスペリエンス'
    - navtiles:
      - title: リアルユーザーの監視
        link: real_user_monitoring/
        icon: rum
        desc: アプリケーションのユーザーエクスペリエンスを把握、観察、分析
      - title: Product Analytics
        link: product_analytics/
        icon: product-analytics
        desc: ユーザーの行動に関する洞察を得て、データに基づく製品の決定を行う
      - title: セッション リプレイ
        link: session_replay/
        icon: session-replay
        desc: ユーザーのユーザーエクスペリエンスをキャプチャし、視覚的に再生します
      - title: 合成監視
        link: synthetics/
        icon: synthetics
        desc: アップタイムの確保、地域ごとの問題点の指摘、アプリケーションのパフォーマンステスト
      - title: モバイルアプリテスト
        link: mobile_app_testing/
        icon: mobile
        desc: モバイルアプリケーションにおけるユーザージャーニーとビジネストランザクションの監視
  - nav_section:
    - name: 'ソフトウェアデリバリー'
    - navtiles:
      - title: 内部開発者ポータル
        link: internal_developer_portal/
        icon: internal-developer-portal-wui
        desc: テレメトリ、メタデータ、ワークフローを統合してデリバリーを加速します
      - title: CI の可視性
        link: continuous_integration/
        icon: ci
        desc: CI パイプラインの健全性とパフォーマンスを監視
      - title: Test Optimization
        link: tests/
        icon: flaky-test-wui
        desc: 不安定なテストの検出と、不安定なテストをもたらしたコミットの特定
      - title: Continuous Testing
        link: continuous_testing/
        icon: continuous-testing
        desc: CI/CD プロバイダーでコードレスインテグレーションとエンドツーエンドテストを実施
      - title: IDE プラグイン
        link: ide_plugins/
        icon: ide
        desc: コーディング中にIDEから直接Datadogサービスと対話します
      - title: DORA Metrics
        link: dora_metrics/
        icon: ci
        desc: 組織のソフトウェアデリバリープロセスを測定し、改善します
      - title: フィーチャーフラグ
        link: feature_flags/
        icon: signpost
        desc: 機能を切り替え、A/Bテストを実施し、コードデプロイなしで機能を段階的に展開します
      - title: コードカバレッジ
        link: code_coverage/
        icon: code-3
        desc: カバレッジデータの傾向を視覚化し、カバレッジの閾値に基づいてPRのマージをブロックします
  - nav_section:
    - name: 'セキュリティ'
    - navtiles:
      - title: Cloud SIEM
        link: security/cloud_siem/
        icon: siem
        desc: クラウドおよびオンプレミスシステム全体でセキュリティ脅威を検出、調査、対応します
      - title: Code Security
        link: security/code_security/
        icon: security-code-security
        desc: コード、依存関係、およびインフラストラクチャとしてのコードの脆弱性を検出し、修正します
      - title: Cloud Security
        link: security/cloud_security_management/
        icon: cloud-security-management
        desc: 構成を継続的に監査し、アイデンティティリスクを評価し、クラウドインフラストラクチャ全体で脅威を検出します
      - title: App and API Protection
        link: security/application_security/
        icon: app-sec
        desc: 本番アプリケーションとAPIをリアルタイムで狙った脅威を検出し、ブロックします
      - title: ワークロード保護
        link: security/workload_protection/
        icon: security-workload-security
        desc: ファイル、ネットワーク、およびプロセスのアクティビティを監視し、インフラストラクチャへのリアルタイムの脅威を検出します
      - title: Sensitive Data Scanner
        link: security/sensitive_data_scanner/
        icon: sensitive-data-scanner
        desc: テレメトリ全体でPII、APIキー、クレジットカード番号などの機密データを検出し、削除します
  - nav_section:
    - name: 'サービス管理'
    - navtiles:
      - title: Incident Management
        link: service_management/incident_management
        icon: incidents
        desc: 組織における破壊的インシデントの特定、分析、緩和
      - title: On-Call
        link: incident_response/on-call/
        icon: on-call
        desc: 適切なチームメンバーにオンコールスケジュールとページングを使用してアラートをルーティングし、エスカレーションします。
      - title: ステータスページ
        link: incident_response/status_pages/
        icon: status-page-wui
        desc: サービスの可用性とインシデントの更新をユーザーやステークホルダーに伝えます。
      - title: Service Level Objectives
        link: service_level_objectives/
        icon: slos
        desc: 一貫した顧客体験を提供するために、パフォーマンス目標を定義し、追跡します。
      - title: Case Management
        link: incident_response/case_management/
        icon: case-management
        desc: 中央集権的な所有権とチームの協力を通じて、問題をトリアージし、追跡し、修正します。
      - title: Workflow Automation
        link: service_management/workflows/
        icon: workflows
        desc: 技術スタック全体のプロセスの自動化とオーケストレーション
      - title: App Builder
        link: service_management/app_builder/
        icon: app-builder
        desc: 内部ツールを効率化するために、ローコードアプリケーションを作成します。
  - nav_section:
    - name: 'プラットフォームの機能とDatadogの拡張'
    - navtiles:
      - title: モニターとアラート設定
        link: monitors/
        icon: monitor
        desc: モニターや通知の作成、編集、管理
      - title: ダッシュボード 
        link: dashboards/
        icon: dashboard
        desc: データの可視化、分析、インサイト生成
      - title: ノートブック
        link: notebooks/
        icon: notebook
        desc: 調査、ポストモーテム、ランブック用のライブグラフを含むリッチテキストドキュメントを作成します。
      - title: モバイルアプリ
        link: mobile/
        icon: mobile
        desc: Datadog のアラート、インシデントなどをモバイルデバイスで閲覧
      - title: Fleet Automation
        link: agent/fleet_automation/
        icon: fleet-automation-wui
        desc: リモートでエージェントを大規模に構成、アップグレード、管理します。
      - title: Account Management
        link: account_management/
        icon: cog-2
        desc: 組織ベースの設定、請求、およびデータアクセス制御を管理します。
      - title: Event Management
        link: events/
        icon: events
        desc: アプリケーションとインフラストラクチャーの注目すべき変化やアラートを追跡
      - title: CoScreen
        link: coscreen/
        icon: coscreen
        desc: ペアプログラミングやインシデント管理のためにアプリケーションウィンドウを共有し、相互作用します。
      - title: OpenTelemetry
        link: opentelemetry/
        icon: open-telemetry
        desc: OpenTelemetry のメトリクス、ログ、トレースを Datadog に取り込む
      - title: 連携
        link: integrations/
        icon: integrations
        desc: アプリケーション、サービス、システムに関するデータを収集
      - title: API
        link: api/latest/
        icon: api
        desc: Datadog API を試す
      - title: Data Security
        link: data_security/
        icon: security-lock
        desc: Datadog のデータ保護方法について
      - title: クライアントSDK
        link: client_sdks/
        icon: building-block
        desc: プラットフォーム用のDatadog SDKをインストールし、構成します。
      - title: Datadogを拡張します。
        link: extend/
        icon: dev-code
        desc: Datadogプラットフォームを拡張します。
      - title: パートナー
        link: partners/
        icon: colab
        desc: ベストプラクティスを学び、クライアント環境の監視を始めましょう。

