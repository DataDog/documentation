heading: Datadog 설명서에 오신 것을 환영합니다.

guides:
    # There can be only 3 guides in this section
  - title: Agent 설치하기
    desc: Datadog으로 데이터를 전송하는 호스트에서 이벤트와 메트릭을 수집합니다.
    link_text: Agent 시작하기
    link: getting_started/agent/
  - title: Integrations 설정하기
    desc: "1,000개 이상의 내장 통합을 통해 메트릭, 트레이스 및 로그를 수집하여 Datadog으로 전송하세요."
    link_text: Integrations 시작하기
    link: getting_started/integrations/
  - title: 앱에서 시작하기
    desc: "Datadog에서 수집한 데이터를 시각화하고 대시보드, 경보, 모니터링 등을 생성합니다."
    link_text: Datadog에서 시작하기
    link: getting_started/application/

nav_sections:
    # For a better rendering, sections should include sub-sections with multiple of 4.
  - nav_section:
    - name: 'Observability'
    - navtiles:
      - title: Infrastructure
        link: infrastructure/
        icon: host-map
        desc: 호스트 및 인프라 구성 요소의 상태와 성능을 확인하세요.
      - title: Metrics
        link: metrics/
        icon: metric
        desc: "메트릭에 대한 배포를 탐색, 검색 및 생성합니다."
      - title: Container Monitoring
        link: containers/
        icon: container
        desc: "컨테이너화된 환경의 상태, 성능 및 보안을 모니터링하세요."
      - title: Serverless
        link: serverless/
        icon: serverless
        desc: 서버리스 애플리케이션의 성능 문제를 감지하고 해결합니다.
      - title: Network Monitoring
        link: network_monitoring/
        icon: network
        desc: 태그가 지정된 개체를 사용해 네트워크 트래픽에 대한 데이터를 수집하고 그래프로 표시합니다.
      - title: Cloud Cost Management
        link: cloud_cost_management/
        icon: cloud-cost-management
        desc: 통합된 관찰 가능성 및 비용 데이터로 클라우드 지출을 관리합니다.
      - title: Cloudcraft
        link: cloudcraft/
        icon: cloudcraft
        desc: 클라우드 인프라스트럭처를 실시간으로 시각화하고 다이어그램으로 표현합니다.
      - title: 스토리지 관리
        link: infrastructure/storage_management/
        icon: file-wui
        desc: "클라우드 스토리지 비용, 사용량 및 데이터 신선도를 최적화하고 문제를 해결하세요."
      - title: APM
        link: tracing/
        icon: apm
        desc: 즉시 사용 가능한 성능 대시보드 및 분산된 트레이스를 탐색하세요.
      - title: Universal Service Monitoring
        link: universal_service_monitoring/
        icon: usm
        desc: 코드 변경 없이 서비스를 검색하고 매핑하며 모니터링합니다.
      - title: Continuous Profiler
        link: profiler/
        icon: profiling-1
        desc: 성능 스냅샷을 비교하고 병목 현상에 대해 자세히 살펴봅니다.
      - title: Database Monitoring
        link: database_monitoring/
        icon: database-2
        desc: "강화된 대시보드, 쿼리 메트릭 및 쿼리 샘플을 확인합니다."
      - title: Data Streams Monitoring
        link: data_streams/
        icon: datastreams-monitoring
        desc: 데이터 스트리밍 파이프라인의 성능을 추적 및 개선합니다.
      - title: Data Observability
        link: data_observability/
        icon: data-observability-wui
        desc: "데이터 품질, 성능 및 비용을 모니터링하여 이상을 감지하고 하류 문제를 예방하세요."
      - title: Log Management
        link: logs/
        icon: log
        desc: 수집된 로그를 처리하고 모니터링 및 보관합니다.
      - title: Sensitive Data Scanner
        link: security/sensitive_data_scanner/
        icon: sensitive-data-scanner
        desc: "텔레메트리 전반에 걸쳐 PII, API 키, 신용 카드 번호 등 민감한 데이터를 탐지하고 익명화 처리하세요."
      - title: Observability Pipelines
        link: observability_pipelines/
        icon: pipelines
        desc: 텔레메트리 파이프라인을 관리하고 모니터링합니다.
      - title: Error Tracking
        link: error_tracking/
        icon: error-tracking
        desc: "웹, 모바일 및 백엔드에서 크리티컬한 오류를 파악하고 문제 해결 속도를 높입니다."
  - nav_section:
    - name: 'AI'
    - navtiles:
      - title: Bits AI Agent
        link: bits_ai/
        icon: bits-ai
        desc: "개발, 보안 및 운영 워크플로를 자동화하는 에이전틱 동료입니다."
      - title: Watchdog
        link: watchdog/
        icon: watchdog
        desc: 애플리케이션 및 인프라스트럭처의 이상 징후를 감지하고 표면화합니다.
      - title: LLM Observability
        link: llm_observability/
        icon: llm-observability
        desc: "LLM 애플리케이션을 트레이스, 모니터링하고 보안을 유지합니다."
  - nav_section:
    - name: 'Digital Experience'
    - navtiles:
      - title: Real User Monitoring
        link: real_user_monitoring/
        icon: rum
        desc: "애플리케이션 사용자 경험을 수집, 관찰 및 분석합니다."
      - title: Product Analytics
        link: product_analytics/
        icon: product-analytics
        desc: 사용자 행동에 대한 인사이트를 확보하고 데이터 기반 제품 의사 결정을 내리세요.
      - title: 세션 리플레이
        link: session_replay/
        icon: session-replay
        desc: 사용자 경험을 캡처하고 시각적으로 재생하세요.
      - title: Synthetic Monitoring
        link: synthetics/
        icon: synthetics
        desc: "가동 시간을 보장하고, 지역적 문제를 제기하며, 애플리케이션 성능을 테스트합니다."
      - title: Mobile App Testing
        link: mobile_app_testing/
        icon: mobile
        desc: 모바일 애플리케이션의 사용자 여정 및 비즈니스 트랜잭션을 모니터링합니다.
  - nav_section:
    - name: 'Software Delivery'
    - navtiles:
      - title: Internal Developer Portal
        link: internal_developer_portal/
        icon: internal-developer-portal-wui
        desc: "텔레메트리, 메타데이터 및 워크플로를 통합해 전달 속도를 높입니다."
      - title: CI Visibility
        link: continuous_integration/
        icon: ci
        desc: CI 파이프라인의 상태와 성능을 모니터링합니다.
      - title: Test Optimization
        link: tests/
        icon: flaky-test-wui
        desc: 취약한 테스트를 감지하고 취약한 테스트를 가져오는 커밋을 식별합니다.
      - title: Continuous Testing
        link: continuous_testing/
        icon: continuous-testing
        desc: CI/CD 제공업체와 코딩 없는 통합 및 엔드투엔드 테스트를 수행합니다.
      - title: IDE Plugins
        link: ide_plugins/
        icon: ide
        desc: 코딩하는 동안 IDE에서 Datadog 서비스와 직접 상호작용하세요.
      - title: DORA Metrics
        link: dora_metrics/
        icon: ci
        desc: 조직의 소프트웨어 배포 프로세스를 측정하고 개선하세요.
      - title: Feature Flag
        link: feature_flags/
        icon: signpost
        desc: 기능을 전환하고 A/B 테스트를 실행하며 코드 배포 없이 기능을 점진적으로 출시하세요.
      - title: Code Coverage
        link: code_coverage/
        icon: code-3
        desc: 커버리지 데이터 추세를 시각화하고 커버리지 기준에 따라 PR 병합을 차단하세요.
  - nav_section:
    - name: 'Security'
    - navtiles:
      - title: Cloud SIEM
        link: security/cloud_siem/
        icon: siem
        desc: "클라우드 및 온프레미스 시스템 전반에 걸쳐 보안 위협을 탐지, 조사 및 대응하세요."
      - title: Code Security
        link: security/code_security/
        icon: security-code-security
        desc: "코드, 종속성 및 인프라 코드에서 취약점을 탐지하고 수정하세요."
      - title: Cloud Security
        link: security/cloud_security_management/
        icon: cloud-security-management
        desc: "구성을 지속적으로 감사하고, 신원 위험을 평가하며, 클라우드 인프라 전반에 걸쳐 위협을 탐지하세요."
      - title: App and API Protection
        link: security/application_security/
        icon: app-sec
        desc: 실시간으로 프로덕션 애플리케이션과 API를 대상으로 하는 위협을 탐지하고 차단하세요.
      - title: Workload Protection
        link: security/workload_protection/
        icon: security-workload-security
        desc: "파일, 네트워크 및 프로세스 활동을 모니터링하여 인프라에 대한 실시간 위협을 탐지하세요."
      - title: Sensitive Data Scanner
        link: security/sensitive_data_scanner/
        icon: sensitive-data-scanner
        desc: "텔레메트리 전반에 걸쳐 PII, API 키, 신용 카드 번호 등 민감한 데이터를 탐지하고 익명화 처리하세요."
  - nav_section:
    - name: 'Service Management'
    - navtiles:
      - title: Incident Management
        link: service_management/incident_management
        icon: incidents
        desc: "위험 요소가 있는 조직의 인시던트를 식별, 분석 및 완화합니다."
      - title: 온콜
        link: incident_response/on-call/
        icon: on-call
        desc: 온콜 일정과 페이징을 통해 경보를 적절한 팀원에게 라우팅하고 에스컬레이션합니다.
      - title: Status Pages
        link: incident_response/status_pages/
        icon: status-page-wui
        desc: 서비스 가용성과 인시던트 업데이트를 사용자 및 이해관계자에게 전달하세요.
      - title: Service Level Objectives
        link: service_level_objectives/
        icon: slos
        desc: 일관된 고객 경험을 제공하기 위해 성과 목표를 정의하고 추적하세요.
      - title: Case Management
        link: incident_response/case_management/
        icon: case-management
        desc: 중앙 집중식 소유권과 팀 협업을 통해 문제를 분류하고 추적하며 수정하세요.
      - title: Workflow Automation
        link: service_management/workflows/
        icon: workflows
        desc: 기술 스택 전반에서 프로세스를 자동화 및 오케스트레이션합니다.
      - title: App Builder
        link: service_management/app_builder/
        icon: app-builder
        desc: 로우코드 애플리케이션을 생성하여 내부 도구를 간소화하세요.
  - nav_section:
    - name: 'Platform Capabilities and Extending Datadog'
    - navtiles:
      - title: 모니터링 및 경보
        link: monitors/
        icon: monitor
        desc: "모니터링과 알림을 생성, 편집 및 관리합니다."
      - title: Dashboards
        link: dashboards/
        icon: dashboard
        desc: 데이터를 시각화하고 분석하여 인사이트를 생성합니다.
      - title: Notebooks
        link: notebooks/
        icon: notebook
        desc: "조사, 사후 분석 및 운영 문서를 위한 실시간 그래프가 포함된 리치 텍스트 문서를 생성하세요."
      - title: 모바일 앱
        link: mobile/
        icon: mobile
        desc: "모바일 장치에서 Datadog 경보, 인시던트 등을 조회합니다."
      - title: Fleet Automation
        link: agent/fleet_automation/
        icon: fleet-automation-wui
        desc: "원격으로 Agent를 대규모로 구성, 업그레이드 및 관리하세요."
      - title: 계정 관리
        link: account_management/
        icon: cog-2
        desc: "조직 기반 설정, 청구 및 데이터 접근 제어를 관리하세요."
      - title: Event Management
        link: events/
        icon: events
        desc: 애플리케이션 및 인프라스트럭처에서 중요한 변경 사항 및 경보를 추적합니다.
      - title: CoScreen
        link: coscreen/
        icon: coscreen
        desc: 페어 프로그래밍 및 인시던트 관리를 위해 애플리케이션 창을 공유하고 상호작용하세요.
      - title: OpenTelemetry
        link: opentelemetry/
        icon: open-telemetry
        desc: "OpenTelemetry 메트릭, 로그 및 트레이스를 Datadog으로 전송합니다."
      - title: Integrations
        link: integrations/
        icon: integrations
        desc: "애플리케이션, 서비스 및 시스템에 관한 데이터를 수집합니다."
      - title: API
        link: api/latest/
        icon: api
        desc: Datadog API를 사용해 보세요.
      - title: 데이터 보안
        link: data_security/
        icon: security-lock
        desc: Datadog의 데이터 보호에 대해 알아보세요.
      - title: 클라이언트 SDK
        link: client_sdks/
        icon: building-block
        desc: Datadog SDK를 귀하의 플랫폼에 맞게 설치하고 구성하세요.
      - title: Datadog을 확장하세요.
        link: extend/
        icon: dev-code
        desc: Datadog 플랫폼을 확장하세요.
      - title: 파트너
        link: partners/
        icon: colab
        desc: 모범 사례에 대해 알아보고 고객 환경 모니터링을 시작하세요.

popular_searches:
  - title: API 설명서
    link: api/
    weight: 10
  - title: Agent 설치
    link: getting_started/agent/
    weight: 20
  - title: 로그 수집
    link: logs/log_collection/
    weight: 30
  - title: 통합 설정
    link: integrations/
    weight: 40
