          $ref: "#/components/schemas/MonitorNotificationRuleConditionalRecipients"
        filter:
          $ref: "#/components/schemas/MonitorNotificationRuleFilter"
        name:
          $ref: "#/components/schemas/MonitorNotificationRuleName"
        recipients:
          $ref: "#/components/schemas/MonitorNotificationRuleRecipients"
      required:
        - name
      type: object
    MonitorNotificationRuleCondition:
      description: >-
        A conditional recipient rule composed of a `scope` (the matching
        condition) and

        `recipients` (who to notify when it matches).
      properties:
        recipients:
          $ref: "#/components/schemas/MonitorNotificationRuleRecipients"
          description: A list of recipients to notify. Uses the same format as the monitor
            `message` field. Must not start with an '@'.
        scope:
          $ref: "#/components/schemas/MonitorNotificationRuleConditionScope"
      required:
        - scope
        - recipients
      type: object
    MonitorNotificationRuleConditionScope:
      description: >-
        Defines the condition under which the recipients are notified. Supported
        formats:

        - Monitor status condition using `transition_type:<status>`, for example
        `transition_type:is_alert`.

        - A single tag key:value pair, for example `env:prod`.
      example: transition_type:is_alert
      maxLength: 3000
      minLength: 1
      type: string
    MonitorNotificationRuleConditionalRecipients:
      description: Use conditional recipients to define different recipients for
        different situations. Cannot be used with `recipients`.
      properties:
        conditions:
          description: Conditions of the notification rule.
          items:
            $ref: "#/components/schemas/MonitorNotificationRuleCondition"
          maxItems: 10
          minItems: 1
          type: array
        fallback_recipients:
          $ref: "#/components/schemas/MonitorNotificationRuleRecipients"
          description: If none of the `conditions` applied, `fallback_recipients` will get
            notified.
      required:
        - conditions
      type: object
    MonitorNotificationRuleCreateRequest:
      description: Request for creating a monitor notification rule.
      properties:
        data:
          $ref: "#/components/schemas/MonitorNotificationRuleCreateRequestData"
      required:
        - data
      type: object
    MonitorNotificationRuleCreateRequestData:
      description: Object to create a monitor notification rule.
      properties:
        attributes:
          $ref: "#/components/schemas/MonitorNotificationRuleAttributes"
        type:
          $ref: "#/components/schemas/MonitorNotificationRuleResourceType"
      required:
        - attributes
      type: object
    MonitorNotificationRuleData:
      description: Monitor notification rule data.
      properties:
        attributes:
          $ref: "#/components/schemas/MonitorNotificationRuleResponseAttributes"
        id:
          $ref: "#/components/schemas/MonitorNotificationRuleId"
        relationships:
          $ref: "#/components/schemas/MonitorNotificationRuleRelationships"
        type:
          $ref: "#/components/schemas/MonitorNotificationRuleResourceType"
      type: object
    MonitorNotificationRuleFilter:
      description: Specifies the matching criteria for monitor notifications.
      oneOf:
        - $ref: "#/components/schemas/MonitorNotificationRuleFilterTags"
        - $ref: "#/components/schemas/MonitorNotificationRuleFilterScope"
    MonitorNotificationRuleFilterScope:
      additionalProperties: false
      description: Filters monitor notifications using a scope expression over
        key:value pairs with boolean logic (AND, OR, NOT).
      properties:
        scope:
          description: A scope expression composed by key:value pairs (e.g. `service:foo`)
            with boolean operators (AND, OR, NOT) and parentheses for grouping.
          example: service:(foo OR bar) AND team:test NOT environment:staging
          maxLength: 3000
          minLength: 1
          type: string
      required:
        - scope
      type: object
    MonitorNotificationRuleFilterTags:
      additionalProperties: false
      description: Filters monitor notifications by a list of tag key:value pairs.
      properties:
        tags:
          description: A list of tag key:value pairs (e.g. `team:product`). All tags must
            match (AND semantics).
          example:
            - team:product
            - host:abc
          items:
            description: A tag key:value pair to match against monitor notifications.
            maxLength: 255
            type: string
          maxItems: 20
          minItems: 1
          type: array
          uniqueItems: true
      required:
        - tags
      type: object
    MonitorNotificationRuleId:
