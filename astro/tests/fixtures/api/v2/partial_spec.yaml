        targets:
          $ref: "#/components/schemas/Targets"
        time_aggregation:
          $ref: "#/components/schemas/TimeAggregation"
        version:
          $ref: "#/components/schemas/Version"
      required:
        - created_at
        - created_by
        - enabled
        - modified_at
        - modified_by
        - name
        - selectors
        - targets
        - version
      type: object
