    AWSLambdaForwarderConfig:
      description: >-
        Log Autosubscription configuration for Datadog Forwarder Lambda
        functions.

        Automatically set up triggers for existing and new logs for some
        services,

        ensuring no logs from new resources are missed and saving time spent on
        manual configuration.
      properties:
        lambdas:
          description: List of Datadog Lambda Log Forwarder ARNs in your AWS account.
            Defaults to `[]`.
          items:
            description: The ARN of a Datadog Lambda Log Forwarder function.
            example: arn:aws:lambda:us-east-1:123456789012:function:DatadogLambdaLogForwarder
            type: string
          type: array
        log_source_config:
          $ref: "#/components/schemas/AWSLambdaForwarderConfigLogSourceConfig"
        sources:
          description: |-
            List of service IDs set to enable automatic log collection.
            Discover the list of available services with the
            [Get list of AWS log ready
            services](https://docs.datadoghq.com/api/latest/aws-logs-integration/#get-list-of-aws-log-ready-services)
            endpoint.
          items:
            description: An AWS service ID for which automatic log collection is enabled.
            example: s3
            type: string
          type: array
      type: object
    AWSLambdaForwarderConfigLogSourceConfig:
      description: Log source configuration.
      properties:
        tag_filters:
          description: List of AWS log source tag filters. Defaults to `[]`.
          items:
            $ref: "#/components/schemas/AWSLogSourceTagFilter"
          type: array
      type: object
    AWSLogSourceTagFilter:
      description: |-
        AWS log source tag filter list. Defaults to `[]`.
        Array of log source to AWS resource tag mappings. Each mapping contains a log source and its
        associated AWS resource tags (in `key:value` format) used to filter logs submitted to Datadog.
        Tag filters are applied for tags on the AWS resource emitting logs; tags associated with the
        log storage entity (such as a CloudWatch Log Group or S3 Bucket) are not considered.
        For more information on resource tag filter syntax,
        [see AWS resource exclusion](https://docs.datadoghq.com/account_management/billing/aws/#aws-resource-exclusion)
        in the AWS integration billing page.
      properties:
        source:
          description: The AWS log source to which the tag filters defined in `tags` are
            applied.
          example: s3
          type: string
        tags:
          description: The AWS resource tags to filter on for the log source specified by
            `source`.
          items:
            description: Tag in the form `key:value`.
            example: env:prod
            type: string
          nullable: true
          type: array
      type: object
    AWSLogsConfig:
      description: AWS Logs Collection config.
      properties:
        lambda_forwarder:
          $ref: "#/components/schemas/AWSLambdaForwarderConfig"
      type: object
    AWSMetricsConfig:
      description: AWS Metrics Collection config.
      properties:
        automute_enabled:
          description: Enable EC2 automute for AWS metrics. Defaults to `true`.
          example: true
          type: boolean
        collect_cloudwatch_alarms:
          description: Enable CloudWatch alarms collection. Defaults to `false`.
          example: false
          type: boolean
        collect_custom_metrics:
          description: Enable custom metrics collection. Defaults to `false`.
          example: false
          type: boolean
        enabled:
          description: Enable AWS metrics collection. Defaults to `true`.
          example: true
          type: boolean
        namespace_filters:
          $ref: "#/components/schemas/AWSNamespaceFilters"
        tag_filters:
          description: AWS Metrics collection tag filters list. Defaults to `[]`.
          items:
            $ref: "#/components/schemas/AWSNamespaceTagFilter"
          type: array
      type: object
    AWSNamespaceFilters:
      description: AWS Metrics namespace filters. Defaults to `exclude_only`.
      oneOf:
        - $ref: "#/components/schemas/AWSNamespaceFiltersExcludeOnly"
        - $ref: "#/components/schemas/AWSNamespaceFiltersIncludeOnly"
    AWSNamespaceFiltersExcludeOnly:
      description: >-
        Exclude only these namespaces from metrics collection.

        Defaults to `["AWS/SQS", "AWS/ElasticMapReduce", "AWS/Usage"]`.

        `AWS/SQS`, `AWS/ElasticMapReduce`, and `AWS/Usage` are excluded by
        default

        to reduce your AWS CloudWatch costs from `GetMetricData` API calls.
      properties:
        exclude_only:
          description: >-
            Exclude only these namespaces from metrics collection.

            Defaults to `["AWS/SQS", "AWS/ElasticMapReduce", "AWS/Usage"]`.

            `AWS/SQS`, `AWS/ElasticMapReduce`, and `AWS/Usage` are excluded by
            default

            to reduce your AWS CloudWatch costs from `GetMetricData` API calls.
          example:
            - AWS/SQS
            - AWS/ElasticMapReduce
            - AWS/Usage
          items:
            description: An AWS CloudWatch namespace to exclude from metrics collection.
            example: AWS/SQS
            type: string
          type: array
      required:
        - exclude_only
      type: object
    AWSNamespaceFiltersIncludeOnly:
      description: Include only these namespaces.
      properties:
        include_only:
          description: Include only these namespaces.
          example:
            - AWS/EC2
          items:
            description: An AWS CloudWatch namespace to include in metrics collection.
            example: AWS/EC2
            type: string
          type: array
      required:
        - include_only
      type: object
    AWSNamespaceTagFilter:
      description: >-
        AWS Metrics Collection tag filters list. Defaults to `[]`.

        The array of custom AWS resource tags (in the form `key:value`) defines
        a filter that Datadog uses

        when collecting metrics from a specified service.

        Wildcards, such as `?` (match a single character) and `*` (match
        multiple characters),

        and exclusion using `!` before the tag are supported.

        For EC2, only hosts that match one of the defined tags are imported into
        Datadog.

        The rest are ignored. For example,
        `env:production,instance-type:c?.*,!region:us-east-1`.
      properties:
        namespace:
          description: The AWS service for which the tag filters defined in `tags` will be
            applied.
          example: AWS/EC2
          type: string
        tags:
          description: The AWS resource tags to filter on for the service specified by
            `namespace`.
          items:
            description: Tag in the form `key:value`.
            example: datadog:true
            type: string
          nullable: true
          type: array
      type: object
