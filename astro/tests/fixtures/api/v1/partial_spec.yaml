components:
  callbacks: {}
  examples: {}
  headers: {}
  links: {}
  parameters:
    SignalID:
      description: The ID of the signal.
      in: path
      name: signal_id
      required: true
      schema:
        type: string
    SlackAccountNamePathParameter:
      description: Your Slack account name.
      in: path
      name: account_name
      required: true
      schema:
        type: string
    SlackChannelNamePathParameter:
      description: The name of the Slack channel being operated on.
      in: path
      name: channel_name
      required: true
      schema:
        type: string
  requestBodies: {}
  responses:
    TooManyRequestsResponse:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/APIErrorResponse"
      description: Too many requests
  schemas:
    APIErrorResponse:
      description: Error response object.
      properties:
        errors:
          description: Array of errors returned by the API.
          example:
            - Bad Request
          items:
            description: Error description.
            example: Bad Request
            type: string
          type: array
      required:
        - errors
      type: object
    AWSAccount:
      description: Returns the AWS account associated with this integration.
      properties:
        access_key_id:
          description: Your AWS access key ID. Only required if your AWS account is a
            GovCloud or China account.
          type: string
        account_id:
          description: Your AWS Account ID without dashes.
          example: "123456789012"
          type: string
        account_specific_namespace_rules:
          additionalProperties:
            description: A list of additional properties.
            type: boolean
          description: >-
            An object (in the form `{"namespace1":true/false,
            "namespace2":true/false}`) containing user-supplied overrides

            for AWS namespace metric collection. **Important**: This field only
            contains namespaces explicitly configured through API calls,

            not the comprehensive enabled or disabled status of all namespaces.
            If a namespace is absent from this field, it uses Datadog's

            internal defaults (all namespaces enabled by default, except
            `AWS/SQS`, `AWS/ElasticMapReduce`, and `AWS/Usage`).

            For a complete view of all namespace statuses, use the V2 AWS
            Integration API instead.
          example:
            auto_scaling: false
            opswork: false
          type: object
        cspm_resource_collection_enabled:
          default: false
          description: Whether Datadog collects cloud security posture management
            resources from your AWS account. This includes additional resources
            not covered under the general `resource_collection`.
          example: true
          type: boolean
        excluded_regions:
          description: |-
            An array of [AWS regions](https://docs.aws.amazon.com/general/latest/gr/rande.html#regional-endpoints)
            to exclude from metrics collection.
          example:
            - us-east-1
            - us-west-2
          items:
            description: Regions to exclude.
            type: string
          type: array
        extended_resource_collection_enabled:
          default: false
          description: Whether Datadog collects additional attributes and configuration
            information about the resources in your AWS account. Required for
            `cspm_resource_collection`.
          example: true
          type: boolean
        filter_tags:
          description: >-
            The array of EC2 tags (in the form `key:value`) defines a filter
            that Datadog uses when collecting metrics from EC2.

            Wildcards, such as `?` (for single characters) and `*` (for multiple
            characters) can also be used.

            Only hosts that match one of the defined tags

            will be imported into Datadog. The rest will be ignored.

            Host matching a given tag can also be excluded by adding `!` before
            the tag.

            For example, `env:production,instance-type:c1.*,!region:us-east-1`
          example:
            - $KEY:$VALUE
          items:
            description: The list of the filter_tags.
            type: string
          type: array
        host_tags:
          description: |-
            Array of tags (in the form `key:value`) to add to all hosts
            and metrics reporting through this integration.
          example:
            - $KEY:$VALUE
          items:
            description: The list of the host_tags.
            type: string
          type: array
        metrics_collection_enabled:
          default: true
          description: Whether Datadog collects metrics for this AWS account.
          example: false
          type: boolean
        resource_collection_enabled:
          default: false
          deprecated: true
          description: Deprecated in favor of 'extended_resource_collection_enabled'.
            Whether Datadog collects a standard set of resources from your AWS
            account.
          example: true
          type: boolean
        role_name:
          description: Your Datadog role delegation name.
          example: DatadogAWSIntegrationRole
          type: string
        secret_access_key:
          description: Your AWS secret access key. Only required if your AWS account is a
            GovCloud or China account.
          type: string
      type: object
    AWSAccountCreateResponse:
      description: The Response returned by the AWS Create Account call.
      properties:
        external_id:
          description: AWS external_id.
          type: string
      type: object
    AWSAccountDeleteRequest:
      description: List of AWS accounts to delete.
      properties:
        access_key_id:
          description: Your AWS access key ID. Only required if your AWS account is a
            GovCloud or China account.
          type: string
        account_id:
          description: Your AWS Account ID without dashes.
          example: "123456789012"
          type: string
        role_name:
          description: Your Datadog role delegation name.
          example: DatadogAWSIntegrationRole
          type: string
      type: object
    AWSAccountListResponse:
      description: List of enabled AWS accounts.
      properties:
        accounts:
          description: List of enabled AWS accounts.
          items:
            $ref: "#/components/schemas/AWSAccount"
          type: array
      type: object
    AWSEventBridgeAccountConfiguration:
      description: The EventBridge configuration for one AWS account.
      properties:
        accountId:
          description: Your AWS Account ID without dashes.
          example: "123456789012"
          type: string
        eventHubs:
          description: Array of AWS event sources associated with this account.
          items:
            $ref: "#/components/schemas/AWSEventBridgeSource"
          type: array
        tags:
          description: |-
            Array of tags (in the form `key:value`) which are added to all hosts
            and metrics reporting through the main AWS integration.
          example:
            - $KEY:$VALUE
          items:
            description: The list of the host_tags.
            type: string
          type: array
      type: object
    AWSEventBridgeCreateRequest:
      description: An object used to create an EventBridge source.
      properties:
        account_id:
          description: Your AWS Account ID without dashes.
          example: "123456789012"
          type: string
        create_event_bus:
          description: |-
            True if Datadog should create the event bus in addition to the event
            source. Requires the `events:CreateEventBus` permission.
          example: true
          type: boolean
        event_generator_name:
          description: >-
            The given part of the event source name, which is then combined with
            an

            assigned suffix to form the full name.
          example: app-alerts
          type: string
        region:
          description: The event source's [AWS
            region](https://docs.aws.amazon.com/general/latest/gr/rande.html#regional-endpoints).
          example: us-east-1
          type: string
      type: object
    AWSEventBridgeCreateResponse:
      description: A created EventBridge source.
      properties:
        event_source_name:
          description: The event source name.
          example: app-alerts-zyxw3210
          type: string
        has_bus:
          description: True if the event bus was created in addition to the source.
          example: true
          type: boolean
        region:
          description: The event source's [AWS
            region](https://docs.aws.amazon.com/general/latest/gr/rande.html#regional-endpoints).
          example: us-east-1
          type: string
        status:
          $ref: "#/components/schemas/AWSEventBridgeCreateStatus"
      type: object
    AWSEventBridgeCreateStatus:
      description: The event source status "created".
      enum:
        - created
      example: created
      type: string
      x-enum-varnames:
        - CREATED
    AWSEventBridgeDeleteRequest:
      description: An object used to delete an EventBridge source.
      properties:
        account_id:
          description: Your AWS Account ID without dashes.
          example: "123456789012"
          type: string
        event_generator_name:
          description: The event source name.
          example: app-alerts-zyxw3210
          type: string
        region:
          description: The event source's [AWS
            region](https://docs.aws.amazon.com/general/latest/gr/rande.html#regional-endpoints).
          example: us-east-1
          type: string
      type: object
    AWSEventBridgeDeleteResponse:
      description: An indicator of the successful deletion of an EventBridge source.
      properties:
        status:
          $ref: "#/components/schemas/AWSEventBridgeDeleteStatus"
      type: object
    AWSEventBridgeDeleteStatus:
      description: The event source status "empty".
      enum:
        - empty
      example: empty
      type: string
      x-enum-varnames:
        - EMPTY
    AWSEventBridgeListResponse:
      description: An object describing the EventBridge configuration for multiple accounts.
      properties:
        accounts:
          description: List of accounts with their event sources.
          items:
            $ref: "#/components/schemas/AWSEventBridgeAccountConfiguration"
          type: array
        isInstalled:
          description: True if the EventBridge sub-integration is enabled for your
            organization.
          type: boolean
      type: object
    AWSEventBridgeSource:
      description: An EventBridge source.
      properties:
        name:
          description: The event source name.
          type: string
        region:
          description: The event source's [AWS
            region](https://docs.aws.amazon.com/general/latest/gr/rande.html#regional-endpoints).
          type: string
      type: object
    AWSNamespace:
      description: The namespace associated with the tag filter entry.
      enum:
        - elb
        - application_elb
        - sqs
        - rds
        - custom
        - network_elb
        - lambda
        - step_functions
      type: string
      x-enum-varnames:
        - ELB
        - APPLICATION_ELB
        - SQS
        - RDS
        - CUSTOM
        - NETWORK_ELB
        - LAMBDA
        - STEP_FUNCTIONS
    AWSTagFilter:
      description: A tag filter.
      properties:
        namespace:
          $ref: "#/components/schemas/AWSNamespace"
        tag_filter_str:
          description: The tag filter string.
          example: prod*
          type: string
      type: object
    AWSTagFilterCreateRequest:
      description: The objects used to set an AWS tag filter.
      properties:
        account_id:
          description: Your AWS Account ID without dashes.
          example: "123456789012"
          type: string
        namespace:
          $ref: "#/components/schemas/AWSNamespace"
        tag_filter_str:
          description: The tag filter string.
          example: prod*
          type: string
      type: object
    AWSTagFilterDeleteRequest:
      description: The objects used to delete an AWS tag filter entry.
      properties:
        account_id:
          description: The unique identifier of your AWS account.
          example: FAKEAC0FAKEAC2FAKEAC
          type: string
        namespace:
          $ref: "#/components/schemas/AWSNamespace"
      type: object
    AWSTagFilterListResponse:
      description: An array of tag filter rules by `namespace` and tag filter string.
      properties:
        filters:
          description: An array of tag filters.
          items:
            $ref: "#/components/schemas/AWSTagFilter"
          type: array
      type: object
    AlertValueWidgetDefinition:
      description: Alert values are query values showing the current value of the
        metric in any monitor defined on your system.
      properties:
        alert_id:
          description: ID of the alert to use in the widget.
          example: ""
          type: string
        description:
          description: The description of the widget.
          type: string
        precision:
          description: Number of decimal to show. If not defined, will use the raw value.
          format: int64
          type: integer
        text_align:
          $ref: "#/components/schemas/WidgetTextAlign"
        title:
          description: Title of the widget.
          type: string
        title_align:
          $ref: "#/components/schemas/WidgetTextAlign"
        title_size:
          description: Size of value in the widget.
          type: string
        type:
          $ref: "#/components/schemas/AlertValueWidgetDefinitionType"
        unit:
          description: Unit to display with the value.
          type: string
      required:
        - type
        - alert_id
      type: object
    AlertValueWidgetDefinitionType:
      default: alert_value
      description: Type of the alert value widget.
      enum:
        - alert_value
      example: alert_value
      type: string
      x-enum-varnames:
        - ALERT_VALUE
    AuthenticationValidationResponse:
      description: Represent validation endpoint responses.
      properties:
        valid:
          description: Return `true` if the authentication response is valid.
          example: true
          readOnly: true
          type: boolean
      type: object
    CheckCanDeleteMonitorResponse:
      description: Response of monitor IDs that can or can't be safely deleted.
      properties:
        data:
          $ref: "#/components/schemas/CheckCanDeleteMonitorResponseData"
        errors:
          additionalProperties:
            description: Strings denoting where a monitor is used.
            items:
              description: Asset where a monitor is used.
              type: string
            type: array
          description: A mapping of Monitor ID to strings denoting where it's used.
          nullable: true
          type: object
      required:
        - data
      type: object
    CheckCanDeleteMonitorResponseData:
      description: Wrapper object with the list of monitor IDs.
      example: {}
      properties:
        ok:
          description: An array of Monitor IDs that can be safely deleted.
          items:
            description: ID of a monitor that can be safely deleted.
            format: int64
            type: integer
          type: array
      type: object
    Creator:
      description: Object describing the creator of the shared element.
      properties:
        email:
          description: Email of the creator.
          type: string
        handle:
          description: Handle of the creator.
          type: string
        name:
          description: Name of the creator.
          nullable: true
          type: string
      readOnly: true
      type: object
    CrossOrgUuids:
      description: The source organization UUID for cross organization queries.
        Feature in Private Beta.
      example:
        - 6434abde-xxxx-yyyy-zzzz-da7ad0900001
      items:
        description: The source organization UUID.
        example: 6434abde-xxxx-yyyy-zzzz-da7ad0900001
        type: string
      maxItems: 1
      type: array
    Dashboard:
      description: >-
        A dashboard is Datadog’s tool for visually tracking, analyzing, and
        displaying

        key performance metrics, which enable you to monitor the health of your
        infrastructure.
      properties:
        author_handle:
          description: Identifier of the dashboard author.
          example: test@datadoghq.com
          readOnly: true
          type: string
        author_name:
          description: Name of the dashboard author.
          example: John Doe
          nullable: true
          readOnly: true
          type: string
        created_at:
          description: Creation date of the dashboard.
          format: date-time
          readOnly: true
          type: string
        description:
          description: Description of the dashboard.
          nullable: true
          type: string
        id:
          description: ID of the dashboard.
          example: 123-abc-456
          readOnly: true
          type: string
        is_read_only:
          deprecated: true
          description: >-
            Whether this dashboard is read-only. If True, only the author and
            admins can make changes to it.


            This property is deprecated; please use the [Restriction Policies
            API](https://docs.datadoghq.com/api/latest/restriction-policies/)
            instead to manage write authorization for individual dashboards.
          example: false
          type: boolean
        layout_type:
          $ref: "#/components/schemas/DashboardLayoutType"
        modified_at:
          description: Modification date of the dashboard.
          format: date-time
          readOnly: true
          type: string
        notify_list:
          description: List of handles of users to notify when changes are made to this
            dashboard.
          items:
            description: User handles.
            type: string
          nullable: true
          type: array
        reflow_type:
          $ref: "#/components/schemas/DashboardReflowType"
        restricted_roles:
          description: A list of role identifiers. Only the author and users associated
            with at least one of these roles can edit this dashboard.
          items:
            description: A role UUID.
            type: string
          type: array
        tabs:
          description: List of tabs for organizing dashboard widgets into groups.
          items:
            $ref: "#/components/schemas/DashboardTab"
          maxItems: 100
          nullable: true
          type: array
        tags:
          description: List of team names representing ownership of a dashboard.
          items:
            description: The name of a Datadog team of the form `team:<name>`
            type: string
          maxItems: 5
          nullable: true
          type: array
        template_variable_presets:
          description: Array of template variables saved views.
          items:
            $ref: "#/components/schemas/DashboardTemplateVariablePreset"
          nullable: true
          type: array
        template_variables:
          description: List of template variables for this dashboard.
          items:
            $ref: "#/components/schemas/DashboardTemplateVariable"
          nullable: true
          type: array
        title:
          description: Title of the dashboard.
          example: ""
          type: string
        url:
          description: The URL of the dashboard.
          example: /dashboard/123-abc-456/example-dashboard-title
          readOnly: true
          type: string
        widgets:
          description: List of widgets to display on the dashboard.
          example:
            - definition:
                requests:
                  fill:
                    q: avg:system.cpu.user{*}
                type: hostmap
          items:
            $ref: "#/components/schemas/Widget"
          type: array
      required:
        - title
        - layout_type
        - widgets
      type: object
    DashboardBulkActionData:
      description: Dashboard bulk action request data.
      example:
        id: 123-abc-456
        type: dashboard
      properties:
        id:
          $ref: "#/components/schemas/DashboardID"
        type:
          $ref: "#/components/schemas/DashboardResourceType"
      required:
        - type
        - id
      type: object
    DashboardBulkActionDataList:
      description: List of dashboard bulk action request data objects.
      example:
        - id: 123-abc-456
          type: dashboard
      items:
        $ref: "#/components/schemas/DashboardBulkActionData"
      type: array
    DashboardBulkDeleteRequest:
      description: Dashboard bulk delete request body.
      example:
        data:
          - id: 123-abc-456
            type: dashboard
      properties:
        data:
          $ref: "#/components/schemas/DashboardBulkActionDataList"
      required:
        - data
      type: object
    DashboardDeleteResponse:
      description: Response from the delete dashboard call.
      properties:
        deleted_dashboard_id:
          description: ID of the deleted dashboard.
          type: string
      type: object
    DashboardGlobalTime:
      description: Object containing the live span selection for the dashboard.
      properties:
        live_span:
          $ref: "#/components/schemas/DashboardGlobalTimeLiveSpan"
      type: object
    DashboardGlobalTimeLiveSpan:
      description: Dashboard global time live_span selection
      enum:
        - 15m
        - 1h
        - 4h
        - 1d
        - 2d
        - 1w
        - 1mo
        - 3mo
      example: 1h
      type: string
      x-enum-varnames:
        - PAST_FIFTEEN_MINUTES
        - PAST_ONE_HOUR
        - PAST_FOUR_HOURS
        - PAST_ONE_DAY
        - PAST_TWO_DAYS
        - PAST_ONE_WEEK
        - PAST_ONE_MONTH
        - PAST_THREE_MONTHS
    DashboardID:
      description: Dashboard resource ID.
      example: 123-abc-456
      type: string
    DashboardInviteType:
      description: Type for shared dashboard invitation request body.
      enum:
        - public_dashboard_invitation
      example: public_dashboard_invitation
      type: string
      x-enum-varnames:
        - PUBLIC_DASHBOARD_INVITATION
    DashboardLayoutType:
      description: Layout type of the dashboard.
      enum:
        - ordered
        - free
      example: ordered
      type: string
      x-enum-varnames:
        - ORDERED
        - FREE
    DashboardList:
      description: Your Datadog Dashboards.
      properties:
        author:
          $ref: "#/components/schemas/Creator"
        created:
          description: Date of creation of the dashboard list.
          format: date-time
          readOnly: true
          type: string
        dashboard_count:
          description: The number of dashboards in the list.
          format: int64
          readOnly: true
          type: integer
        id:
          description: The ID of the dashboard list.
          format: int64
          readOnly: true
          type: integer
        is_favorite:
          description: Whether or not the list is in the favorites.
          readOnly: true
          type: boolean
        modified:
          description: Date of last edition of the dashboard list.
          format: date-time
          readOnly: true
          type: string
        name:
          description: The name of the dashboard list.
          example: My Dashboard
          type: string
        type:
          description: The type of dashboard list.
          example: manual_dashboard_list
          readOnly: true
          type: string
      required:
        - name
      type: object
    DashboardListDeleteResponse:
      description: Deleted dashboard details.
      properties:
        deleted_dashboard_list_id:
          description: ID of the deleted dashboard list.
          format: int64
          type: integer
      type: object
    DashboardListListResponse:
      description: Information on your dashboard lists.
      properties:
        dashboard_lists:
          description: List of all your dashboard lists.
          items:
            $ref: "#/components/schemas/DashboardList"
          type: array
      type: object
    DashboardReflowType:
      description: >-
        Reflow type for a **new dashboard layout** dashboard. Set this only when
        layout type is 'ordered'.

        If set to 'fixed', the dashboard expects all widgets to have a layout,
        and if it's set to 'auto',

        widgets should not have layouts.
      enum:
        - auto
        - fixed
      type: string
      x-enum-varnames:
        - AUTO
        - FIXED
    DashboardResourceType:
      default: dashboard
      description: Dashboard resource type.
      enum:
        - dashboard
      example: dashboard
      type: string
      x-enum-varnames:
        - DASHBOARD
    DashboardRestoreRequest:
      description: Dashboard restore request body.
      example:
        data:
          - id: 123-abc-456
            type: dashboard
      properties:
        data:
          $ref: "#/components/schemas/DashboardBulkActionDataList"
      required:
        - data
      type: object
    DashboardShareType:
      description: Type of sharing access (either open to anyone who has the public
        URL or invite-only).
      enum:
        - open
        - invite
        - embed
      nullable: true
      type: string
      x-enum-varnames:
        - OPEN
        - INVITE
        - EMBED
    DashboardSummary:
      description: Dashboard summary response.
      properties:
        dashboards:
          description: List of dashboard definitions.
          items:
            $ref: "#/components/schemas/DashboardSummaryDefinition"
          type: array
      type: object
    DashboardSummaryDefinition:
      description: Dashboard definition.
      properties:
        author_handle:
          description: Identifier of the dashboard author.
          type: string
        created_at:
          description: Creation date of the dashboard.
          format: date-time
          type: string
        description:
          description: Description of the dashboard.
          nullable: true
          type: string
        id:
          description: Dashboard identifier.
          type: string
        is_read_only:
          deprecated: true
          description: >-
            Whether this dashboard is read-only. If True, only the author and
            admins can make changes to it.


            This property is deprecated; please use the [Restriction Policies
            API](https://docs.datadoghq.com/api/latest/restriction-policies/)
            instead to manage write authorization for individual dashboards.
          type: boolean
        layout_type:
          $ref: "#/components/schemas/DashboardLayoutType"
        modified_at:
          description: Modification date of the dashboard.
          format: date-time
          type: string
        title:
          description: Title of the dashboard.
          type: string
        url:
          description: URL of the dashboard.
          type: string
      type: object
    DashboardTab:
      description: Dashboard tab for organizing widgets.
      properties:
        id:
          description: UUID of the tab.
          example: ""
          format: uuid
          type: string
        name:
          description: Name of the tab.
          example: L
          maxLength: 100
          minLength: 1
          type: string
        widget_ids:
          description: List of widget IDs belonging to this tab. The backend also accepts
            positional references in @N format (1-indexed) as a convenience for
            Terraform and other declarative tools.
          example:
            - 0
          items:
            description: Widget ID.
            format: int64
            type: integer
          type: array
      required:
        - id
        - name
        - widget_ids
      type: object
    DashboardTemplateVariable:
      description: Template variable.
      properties:
        available_values:
          description: The list of values that the template variable drop-down is limited
            to.
          example:
            - my-host
            - host1
            - host2
          items:
            description: Template variable value.
            type: string
          nullable: true
          type: array
        default:
          deprecated: true
          description: (deprecated) The default value for the template variable on
            dashboard load. Cannot be used in conjunction with `defaults`.
          example: my-host
          nullable: true
          type: string
        defaults:
          description: One or many default values for template variables on load. If more
            than one default is specified, they will be unioned together with
            `OR`. Cannot be used in conjunction with `default`.
          example:
            - my-host-1
            - my-host-2
          items:
            description: One of many default values for the template variable on dashboard
              load.
            minLength: 1
            type: string
          type: array
        name:
          description: The name of the variable.
          example: host1
          type: string
        prefix:
          description: The tag prefix associated with the variable. Only tags with this
            prefix appear in the variable drop-down.
          example: host
          nullable: true
