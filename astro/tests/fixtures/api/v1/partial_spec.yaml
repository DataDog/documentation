info:
  contact:
    email: support@datadoghq.com
    name: Datadog Support
    url: https://www.datadoghq.com/support/
  description: Collection of all Datadog Public endpoints.
  title: Datadog API V1 Collection
  version: "1.0"
openapi: 3.0.0
paths:
  /api/v1/daily_custom_reports:
    get:
      deprecated: true
      description: |-
        Get daily custom reports.
        **Note:** This endpoint will be fully deprecated on December 1, 2022.
        Refer to [Migrating from v1 to v2 of the Usage Attribution API](https://docs.datadoghq.com/account_management/guide/usage-attribution-migration/) for the associated migration guide.
      operationId: GetDailyCustomReports
      parameters:
        - description: The number of files to return in the response. `[default=60]`.
          in: query
          name: page[size]
          required: false
          schema:
            format: int64
            type: integer
        - description: The identifier of the first page to return. This parameter is used
            for the pagination feature `[default=0]`.
          in: query
          name: page[number]
          required: false
          schema:
            format: int64
            type: integer
        - description: "The direction to sort by: `[desc, asc]`."
          in: query
          name: sort_dir
          required: false
          schema:
            $ref: "#/components/schemas/UsageSortDirection"
        - description: "The field to sort by: `[computed_on, size, start_date, end_date]`."
          in: query
          name: sort
          required: false
          schema:
            $ref: "#/components/schemas/UsageSort"
      responses:
        "200":
          content:
            application/json;datetime-format=rfc3339:
              schema:
                $ref: "#/components/schemas/UsageCustomReportsResponse"
          description: OK
        "403":
          content:
            application/json;datetime-format=rfc3339:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Forbidden - User is not authorized
        "429":
          content:
            application/json;datetime-format=rfc3339:
              schema:
                $ref: "#/components/schemas/APIErrorResponse"
          description: Too many requests
      summary: Get the list of available daily custom reports
      tags:
        - Usage Metering
      x-menu-order: 34
      x-permission:
        operator: OR
        permissions:
          - usage_read
  /api/v1/daily_custom_reports/{report_id}:
    get:
      deprecated: true
      description: |-
        Get specified daily custom reports.
        **Note:** This endpoint will be fully deprecated on December 1, 2022.
        Refer to [Migrating from v1 to v2 of the Usage Attribution API](https://docs.datadoghq.com/account_management/guide/usage-attribution-migration/) for the associated migration guide.
      operationId: GetSpecifiedDailyCustomReports
      parameters:
        - description: Date of the report in the format `YYYY-MM-DD`.
          in: path
          name: report_id
          required: true
          schema:
            type: string
      responses:
        "200":
          content:
            application/json;datetime-format=rfc3339:
              schema:
