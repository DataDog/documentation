        **Note**: The `layout` property is required for widgets in dashboards
        with `free` `layout_type`.
              For the **new dashboard layout**, the `layout` property depends on the `reflow_type` of the dashboard.
              - If `reflow_type` is `fixed`, `layout` is required.
              - If `reflow_type` is `auto`, `layout` should not be set.
      properties:
        definition:
          $ref: "#/components/schemas/WidgetDefinition"
        id:
          description: ID of the widget.
          format: int64
          type: integer
        layout:
          $ref: "#/components/schemas/WidgetLayout"
      required:
        - definition
      type: object
    WidgetAggregator:
      description: Aggregator used for the request.
      enum:
        - avg
        - last
        - max
        - min
        - sum
        - percentile
      type: string
      x-enum-varnames:
        - AVERAGE
        - LAST
        - MAXIMUM
        - MINIMUM
        - SUM
        - PERCENTILE
    WidgetAxis:
      description: Axis controls for the widget.
      properties:
        include_zero:
          description: Set to `true` to include zero.
          type: boolean
        label:
          description: The label of the axis to display on the graph. Only usable on
            Scatterplot Widgets.
          type: string
        max:
          default: auto
          description: Specifies maximum numeric value to show on the axis. Defaults to
            `auto`.
          type: string
        min:
          default: auto
          description: Specifies minimum numeric value to show on the axis. Defaults to
            `auto`.
          type: string
        scale:
          default: linear
          description: Specifies the scale type. Possible values are `linear`, `log`,
            `sqrt`, and `pow##` (for example `pow2` or `pow0.5`).
          type: string
      type: object
    WidgetBackgroundColor:
      description: Background color of the widget. Supported values are `white`,
        `blue`, `purple`, `pink`, `orange`, `yellow`, `green`, `gray`,
        `vivid_blue`, `vivid_purple`, `vivid_pink`, `vivid_orange`,
        `vivid_yellow`, `vivid_green`, and `transparent`.
      type: string
    WidgetComparator:
      description: Comparator to apply.
      enum:
        - =
        - ">"
        - ">="
        - <
        - <=
      example: ">"
      type: string
      x-enum-varnames:
        - EQUAL_TO
        - GREATER_THAN
        - GREATER_THAN_OR_EQUAL_TO
        - LESS_THAN
        - LESS_THAN_OR_EQUAL_TO
    WidgetConditionalFormat:
      description: Define a conditional format for the widget.
      properties:
        comparator:
          $ref: "#/components/schemas/WidgetComparator"
        custom_bg_color:
          description: Color palette to apply to the background, same values available as
            palette.
          type: string
        custom_fg_color:
          description: Color palette to apply to the foreground, same values available as
            palette.
          type: string
        hide_value:
          description: True hides values.
          type: boolean
        image_url:
          description: Displays an image as the background.
          type: string
        metric:
          description: Metric from the request to correlate this conditional format with.
          type: string
        palette:
          $ref: "#/components/schemas/WidgetPalette"
        timeframe:
          description: Defines the displayed timeframe.
          type: string
        value:
          description: Value for the comparator.
          example: 0
          format: double
          type: number
      required:
        - comparator
        - value
        - palette
      type: object
    WidgetCustomLink:
      description: Custom links help you connect a data value to a URL, like a Datadog
        page or your AWS console.
      properties:
        is_hidden:
          description: The flag for toggling context menu link visibility.
          type: boolean
        label:
          description: The label for the custom link URL. Keep the label short and
            descriptive. Use metrics and tags as variables.
          example: Search logs for {{host}}
          type: string
        link:
          description: The URL of the custom link. URL must include `http` or `https`. A
            relative URL must start with `/`.
          example: https://app.datadoghq.com/logs?query={{host}}
          type: string
        override_label:
          description: The label ID that refers to a context menu link. Can be `logs`,
            `hosts`, `traces`, `profiles`, `processes`, `containers`, or `rum`.
          example: logs
          type: string
      type: object
    WidgetDefinition:
      description: "[Definition of the
        widget](https://docs.datadoghq.com/dashboards/widgets/)."
      # NOTE: Trimmed for the test fixture. The live spec lists ~37 widget
      # variants here; several recurse back into WidgetDefinition (a group
      # widget contains widgets), so rendering a dashboard operation expanded
      # the cycle to MAX_DEPTH for every variant and produced ~36MB of HTML,
      # hanging the snapshot suite. Kept three representative variants: a simple
      # value widget, a request-bearing widget with nested schema tables, and
      # one recursive variant so the cycle-render path is still exercised.
      oneOf:
        - $ref: "#/components/schemas/AlertValueWidgetDefinition"
        - $ref: "#/components/schemas/TimeseriesWidgetDefinition"
        - $ref: "#/components/schemas/GroupWidgetDefinition"
    WidgetDisplayType:
      description: Type of display to use for the request.
      enum:
        - area
        - bars
        - line
        - overlay
      type: string
      x-enum-varnames:
        - AREA
        - BARS
        - LINE
        - OVERLAY
    WidgetEvent:
      deprecated: true
      description: |-
        Event overlay control options.

        See the dedicated [Events JSON schema documentation](https://docs.datadoghq.com/dashboards/graphing_json/widget_json/#events-schema)
        to learn how to build the `<EVENTS_SCHEMA>`.
      properties:
        q:
          description: Query definition.
          example: ""
          type: string
        tags_execution:
          description: The execution method for multi-value filters.
          type: string
      required:
        - q
      type: object
    WidgetFormula:
      description: Formula to be used in a widget query.
      properties:
        alias:
          description: Expression alias.
          type: string
        cell_display_mode:
          $ref: "#/components/schemas/TableWidgetCellDisplayMode"
        cell_display_mode_options:
          $ref: "#/components/schemas/WidgetFormulaCellDisplayModeOptions"
        conditional_formats:
          description: List of conditional formats.
          items:
            $ref: "#/components/schemas/WidgetConditionalFormat"
          type: array
        formula:
          description: String expression built from queries, formulas, and functions.
          example: func(a) + b
          type: string
        limit:
          $ref: "#/components/schemas/WidgetFormulaLimit"
        number_format:
          $ref: "#/components/schemas/WidgetNumberFormat"
        style:
          $ref: "#/components/schemas/WidgetFormulaStyle"
      required:
        - formula
      type: object
    WidgetFormulaCellDisplayModeOptions:
      description: Cell display mode options for the widget formula. (only if
        `cell_display_mode` is set to `trend`).
      properties:
        trend_type:
          $ref: "#/components/schemas/WidgetFormulaCellDisplayModeOptionsTrendType"
        y_scale:
          $ref: "#/components/schemas/WidgetFormulaCellDisplayModeOptionsYScale"
      type: object
    WidgetFormulaCellDisplayModeOptionsTrendType:
      description: Trend type for the cell display mode options.
      enum:
        - area
        - line
        - bars
      example: area
      type: string
      x-enum-varnames:
        - AREA
        - LINE
        - BARS
    WidgetFormulaCellDisplayModeOptionsYScale:
      description: Y scale for the cell display mode options.
      enum:
        - shared
        - independent
      example: shared
      type: string
      x-enum-varnames:
        - SHARED
        - INDEPENDENT
    WidgetFormulaLimit:
      description: Options for limiting results returned.
      properties:
        count:
          description: Number of results to return.
          format: int64
          type: integer
        order:
          $ref: "#/components/schemas/QuerySortOrder"
      type: object
    WidgetFormulaStyle:
      description: Styling options for widget formulas.
      properties:
        palette:
          description: The color palette used to display the formula. A guide to the
            available color palettes can be found at
            https://docs.datadoghq.com/dashboards/guide/widget_colors
          example: classic
          type: string
        palette_index:
          description: Index specifying which color to use within the palette.
          example: 1
          format: int64
          type: integer
      type: object
    WidgetLayout:
      description: The layout for a widget on a `free` or **new dashboard layout**
        dashboard.
      properties:
        height:
          description: The height of the widget. Should be a non-negative integer.
          example: 0
          format: int64
          minimum: 0
          type: integer
        is_column_break:
          description: >-
            Whether the widget should be the first one on the second column in
            high density or not.

            **Note**: Only for the **new dashboard layout** and only one widget
            in the dashboard should have this property set to `true`.
          type: boolean
        width:
          description: The width of the widget. Should be a non-negative integer.
          example: 0
          format: int64
          minimum: 0
          type: integer
        x:
          description: The position of the widget on the x (horizontal) axis. Should be a
            non-negative integer.
          example: 0
          format: int64
          minimum: 0
          type: integer
        y:
          description: The position of the widget on the y (vertical) axis. Should be a
            non-negative integer.
          example: 0
          format: int64
          minimum: 0
          type: integer
      required:
        - x
        - y
        - width
        - height
      type: object
    WidgetLayoutType:
      description: Layout type of the group.
      enum:
        - ordered
      example: ordered
      type: string
      x-enum-varnames:
        - ORDERED
    WidgetLegacyLiveSpan:
      additionalProperties: false
      description: Wrapper for live span
      properties:
        hide_incomplete_cost_data:
          description: Whether to hide incomplete cost data in the widget.
          type: boolean
        live_span:
          $ref: "#/components/schemas/WidgetLiveSpan"
      type: object
    WidgetLegendSize:
      description: Available legend sizes for a widget. Should be one of "0", "2",
        "4", "8", "16", or "auto".
      type: string
    WidgetLineType:
      description: Type of lines displayed.
      enum:
        - dashed
        - dotted
        - solid
      type: string
      x-enum-varnames:
        - DASHED
        - DOTTED
        - SOLID
    WidgetLineWidth:
      description: Width of line displayed.
      enum:
        - normal
        - thick
        - thin
      type: string
      x-enum-varnames:
        - NORMAL
        - THICK
        - THIN
    WidgetLiveSpan:
      description: The available timeframes depend on the widget you are using.
      enum:
        - 1m
        - 5m
        - 10m
        - 15m
        - 30m
        - 1h
        - 4h
        - 1d
        - 2d
        - 1w
        - 1mo
        - 3mo
        - 6mo
        - week_to_date
        - month_to_date
        - 1y
        - alert
      example: 5m
      type: string
      x-enum-varnames:
        - PAST_ONE_MINUTE
        - PAST_FIVE_MINUTES
        - PAST_TEN_MINUTES
        - PAST_FIFTEEN_MINUTES
        - PAST_THIRTY_MINUTES
        - PAST_ONE_HOUR
        - PAST_FOUR_HOURS
        - PAST_ONE_DAY
        - PAST_TWO_DAYS
        - PAST_ONE_WEEK
        - PAST_ONE_MONTH
        - PAST_THREE_MONTHS
        - PAST_SIX_MONTHS
        - WEEK_TO_DATE
        - MONTH_TO_DATE
        - PAST_ONE_YEAR
        - ALERT
    WidgetLiveSpanUnit:
      description: Unit of the time span.
      enum:
        - minute
        - hour
        - day
        - week
        - month
        - year
      example: minute
      type: string
      x-enum-varnames:
        - MINUTE
        - HOUR
        - DAY
        - WEEK
        - MONTH
        - YEAR
    WidgetMarker:
      description: Markers allow you to add visual conditional formatting for your graphs.
      properties:
        display_type:
          description: >-
            Combination of:
              - A severity error, warning, ok, or info
              - A line type: dashed, solid, or bold
            In this case of a Distribution widget, this can be set to be
            `percentile`.
          example: error dashed
          type: string
        label:
          description: Label to display over the marker.
          example: Error threshold
          type: string
        time:
          description: Timestamp for the widget.
          type: string
        value:
          description: >-
            Value to apply. Can be a single value y = 15 or a range of values 0
            < y < 10.

            For Distribution widgets with `display_type` set to `percentile`,
            this should be

            a numeric percentile value (for example, "90" for P90).
          example: y = 15
          type: string
      required:
        - value
      type: object
    WidgetNewFixedSpan:
      description: Used for fixed span times, such as 'March 1 to March 7'.
      properties:
        from:
          description: Start time in milliseconds since epoch.
          example: 1712080128000
          format: int64
          minimum: 0
          type: integer
        hide_incomplete_cost_data:
          description: Whether to hide incomplete cost data in the widget.
          type: boolean
        to:
          description: End time in milliseconds since epoch.
          example: 1712083128000
          format: int64
          minimum: 0
          type: integer
        type:
          $ref: "#/components/schemas/WidgetNewFixedSpanType"
      required:
        - type
        - from
        - to
      type: object
    WidgetNewFixedSpanType:
      description: Type "fixed" denotes a fixed span.
      enum:
        - fixed
      example: fixed
      type: string
      x-enum-varnames:
        - FIXED
    WidgetNewLiveSpan:
      description: Used for arbitrary live span times, such as 17 minutes or 6 hours.
      properties:
        hide_incomplete_cost_data:
          description: Whether to hide incomplete cost data in the widget.
          type: boolean
        type:
          $ref: "#/components/schemas/WidgetNewLiveSpanType"
        unit:
          $ref: "#/components/schemas/WidgetLiveSpanUnit"
        value:
          description: Value of the time span.
          example: 4
          format: int64
          minimum: 1
          type: integer
      required:
        - type
        - value
        - unit
      type: object
    WidgetNewLiveSpanType:
      description: Type "live" denotes a live span in the new format.
      enum:
        - live
      example: live
      type: string
      x-enum-varnames:
        - LIVE
    WidgetNumberFormat:
      description: Number format options for the widget.
      properties:
        unit:
          $ref: "#/components/schemas/NumberFormatUnit"
        unit_scale:
          $ref: "#/components/schemas/NumberFormatUnitScale"
      type: object
    WidgetPalette:
      description: Color palette to apply.
      enum:
        - blue
        - custom_bg
        - custom_image
        - custom_text
        - gray_on_white
        - grey
        - green
        - orange
        - red
        - red_on_white
        - white_on_gray
        - white_on_green
        - green_on_white
        - white_on_red
        - white_on_yellow
        - yellow_on_white
        - black_on_light_yellow
        - black_on_light_green
        - black_on_light_red
      example: blue
      type: string
      x-enum-varnames:
        - BLUE
        - CUSTOM_BACKGROUND
        - CUSTOM_IMAGE
        - CUSTOM_TEXT
        - GRAY_ON_WHITE
        - GREY
        - GREEN
        - ORANGE
        - RED
        - RED_ON_WHITE
        - WHITE_ON_GRAY
        - WHITE_ON_GREEN
        - GREEN_ON_WHITE
        - WHITE_ON_RED
        - WHITE_ON_YELLOW
        - YELLOW_ON_WHITE
        - BLACK_ON_LIGHT_YELLOW
        - BLACK_ON_LIGHT_GREEN
        - BLACK_ON_LIGHT_RED
    WidgetSort:
      description: Widget sorting methods.
      enum:
        - asc
        - desc
      example: desc
      type: string
      x-enum-varnames:
        - ASCENDING
        - DESCENDING
    WidgetStyleOrderBy:
      description: >-
        How to order series in timeseries visualizations.

        - `tags`: Order series alphabetically by tag name (default behavior)

        - `values`: Order series by their current metric values (typically
        descending)
      enum:
        - tags
        - values
      type: string
      x-enum-varnames:
        - TAGS
        - VALUES
    WidgetTextAlign:
      description: How to align the text on the widget.
      enum:
        - center
        - left
        - right
      type: string
      x-enum-varnames:
        - CENTER
        - LEFT
        - RIGHT
    WidgetTime:
      description: Time setting for the widget.
      oneOf:
        - $ref: "#/components/schemas/WidgetLegacyLiveSpan"
        - $ref: "#/components/schemas/WidgetNewLiveSpan"
        - $ref: "#/components/schemas/WidgetNewFixedSpan"
