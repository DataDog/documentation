    LogQueryDefinition:
      description: The log query.
      properties:
        compute:
          $ref: "#/components/schemas/LogsQueryCompute"
        group_by:
          description: List of tag prefixes to group by in the case of a cluster check.
          items:
            $ref: "#/components/schemas/LogQueryDefinitionGroupBy"
          type: array
        index:
          description: A coma separated-list of index names. Use "*" query all indexes at
            once. [Multiple
            Indexes](https://docs.datadoghq.com/logs/indexes/#multiple-indexes)
          example: days-3,days-7
          type: string
        multi_compute:
          description: This field is mutually exclusive with `compute`.
          items:
            $ref: "#/components/schemas/LogsQueryCompute"
          type: array
        search:
          $ref: "#/components/schemas/LogQueryDefinitionSearch"
      type: object
    LogQueryDefinitionGroupBy:
      description: Defined items in the group.
      properties:
        facet:
          description: Facet name.
          example: resource_name
          type: string
        limit:
          description: Maximum number of items in the group.
          example: 50
          format: int64
          type: integer
        sort:
          $ref: "#/components/schemas/LogQueryDefinitionGroupBySort"
      required:
        - facet
      type: object
    LogQueryDefinitionGroupBySort:
      description: Define a sorting method.
      properties:
        aggregation:
          description: The aggregation method.
          example: avg
          type: string
        facet:
          description: Facet name.
          example: "@string_query.interval"
          type: string
        order:
          $ref: "#/components/schemas/WidgetSort"
      required:
        - aggregation
        - order
      type: object
    LogQueryDefinitionSearch:
      description: The query being made on the logs.
      properties:
        query:
          description: Search value to apply.
          example: ""
          type: string
      required:
        - query
      type: object
    LogsByRetention:
      description: Object containing logs usage data broken down by retention period.
      properties:
        orgs:
          $ref: "#/components/schemas/LogsByRetentionOrgs"
        usage:
          description: Aggregated index logs usage for each retention period with usage.
          items:
            $ref: "#/components/schemas/LogsRetentionAggSumUsage"
          type: array
        usage_by_month:
          $ref: "#/components/schemas/LogsByRetentionMonthlyUsage"
      type: object
    LogsByRetentionMonthlyUsage:
      description: Object containing a summary of indexed logs usage by retention
        period for a single month.
      properties:
        date:
          description: The month for the usage.
          format: date-time
          type: string
        usage:
          description: Indexed logs usage for each active retention for the month.
          items:
            $ref: "#/components/schemas/LogsRetentionSumUsage"
          type: array
      type: object
    LogsByRetentionOrgUsage:
      description: Indexed logs usage by retention for a single organization.
      properties:
        usage:
          description: Indexed logs usage for each active retention for the organization.
          items:
            $ref: "#/components/schemas/LogsRetentionSumUsage"
          type: array
      type: object
    LogsByRetentionOrgs:
      description: Indexed logs usage summary for each organization for each retention
        period with usage.
      properties:
        usage:
          description: Indexed logs usage summary for each organization.
          items:
            $ref: "#/components/schemas/LogsByRetentionOrgUsage"
          type: array
      type: object
    LogsQueryCompute:
      description: Define computation for a log query.
      properties:
        aggregation:
          description: The aggregation method.
          example: avg
          type: string
        facet:
          description: Facet name.
          example: "@duration"
          type: string
        interval:
          description: Define a time interval in seconds.
          example: 5000
          format: int64
          type: integer
      required:
        - aggregation
      type: object
    LogsRetentionAggSumUsage:
      description: Object containing indexed logs usage aggregated across
        organizations and months for a retention period.
      properties:
        logs_indexed_logs_usage_agg_sum:
          description: Total indexed logs for this retention period.
          format: int64
          type: integer
        logs_live_indexed_logs_usage_agg_sum:
          description: Live indexed logs for this retention period.
          format: int64
          type: integer
        logs_rehydrated_indexed_logs_usage_agg_sum:
          description: Rehydrated indexed logs for this retention period.
          format: int64
          type: integer
        retention:
          description: The retention period in days or "custom" for all custom retention
            periods.
          type: string
      type: object
    LogsRetentionSumUsage:
      description: Object containing indexed logs usage grouped by retention period
        and summed.
      properties:
        logs_indexed_logs_usage_sum:
          description: Total indexed logs for this retention period.
          format: int64
          type: integer
        logs_live_indexed_logs_usage_sum:
          description: Live indexed logs for this retention period.
          format: int64
          type: integer
        logs_rehydrated_indexed_logs_usage_sum:
          description: Rehydrated indexed logs for this retention period.
          format: int64
          type: integer
        retention:
          description: The retention period in days or "custom" for all custom retention
            periods.
          type: string
      type: object
    MatchingDowntime:
      description: Object describing a downtime that matches this monitor.
      properties:
        end:
          description: POSIX timestamp to end the downtime.
          example: 1412792983
          format: int64
          nullable: true
          type: integer
        id:
          description: The downtime ID.
          example: 1625
          format: int64
          readOnly: true
          type: integer
        scope:
          description: >-
            The scope(s) to which the downtime applies. Must be in `key:value`
            format. For example, `host:app2`.

            Provide multiple scopes as a comma-separated list like
            `env:dev,env:prod`.

            The resulting downtime applies to sources that matches ALL provided
            scopes (`env:dev` **AND** `env:prod`).
          example:
            - env:staging
          items:
            description: A scope. For example, `"env:staging"`.
            type: string
          type: array
        start:
          description: POSIX timestamp to start the downtime.
          example: 1412792983
          format: int64
          type: integer
      required:
        - id
      type: object
    Monitor:
      description: Object describing a monitor.
      properties:
        assets:
          description: The list of monitor assets tied to a monitor, which represents key
            links for users to take action on monitor alerts (for example,
            runbooks).
          items:
            $ref: "#/components/schemas/MonitorAsset"
          type: array
        created:
          description: Timestamp of the monitor creation.
          format: date-time
          readOnly: true
          type: string
        creator:
          $ref: "#/components/schemas/Creator"
        deleted:
          description: Whether or not the monitor is deleted. (Always `null`)
          format: date-time
          nullable: true
          readOnly: true
          type: string
        draft_status:
          $ref: "#/components/schemas/MonitorDraftStatus"
        id:
          description: ID of this monitor.
          format: int64
          readOnly: true
          type: integer
        matching_downtimes:
          description: A list of active v1 downtimes that match this monitor.
          items:
            $ref: "#/components/schemas/MatchingDowntime"
          type: array
        message:
          description: A message to include with notifications for this monitor.
          type: string
        modified:
          description: Last timestamp when the monitor was edited.
          format: date-time
          readOnly: true
          type: string
        multi:
          description: Whether or not the monitor is broken down on different groups.
          readOnly: true
          type: boolean
        name:
          description: The monitor name.
          example: My monitor
          type: string
        options:
          $ref: "#/components/schemas/MonitorOptions"
        overall_state:
          $ref: "#/components/schemas/MonitorOverallStates"
        priority:
          description: Integer from 1 (high) to 5 (low) indicating alert severity.
          format: int64
          nullable: true
          type: integer
        query:
          description: The monitor query.
          example: avg(last_5m):sum:system.net.bytes_rcvd{host:host0} > 100
          type: string
        restricted_roles:
          description: A list of unique role identifiers to define which roles are allowed
            to edit the monitor. The unique identifiers for all roles can be
            pulled from the [Roles
            API](https://docs.datadoghq.com/api/latest/roles/#list-roles) and
            are located in the `data.id` field. Editing a monitor includes any
            updates to the monitor configuration, monitor deletion, and muting
            of the monitor for any amount of time. You can use the [Restriction
            Policies
            API](https://docs.datadoghq.com/api/latest/restriction-policies/) to
            manage write authorization for individual monitors by teams and
            users, in addition to roles.
          items:
            description: A role UUID.
            type: string
          nullable: true
          type: array
        state:
          $ref: "#/components/schemas/MonitorState"
        tags:
          description: Tags associated to your monitor.
          items:
            description: A Datadog tag.
            type: string
          type: array
        type:
          $ref: "#/components/schemas/MonitorType"
      required:
        - type
        - query
      type: object
    MonitorAsset:
      description: >-
        Represents key links tied to a monitor to help users take action on
        alerts.

        This feature is in Preview and only available to users with the feature
        enabled.
      properties:
        category:
          $ref: "#/components/schemas/MonitorAssetCategory"
        name:
          description: Name for the monitor asset
          example: Monitor Runbook
          type: string
        resource_key:
          description: Represents the identifier of the internal Datadog resource that
            this asset represents. IDs in this field should be passed in as
            strings.
          example: "12345"
          type: string
        resource_type:
          $ref: "#/components/schemas/MonitorAssetResourceType"
        url:
          description: URL link for the asset. For links with an internal resource type
            set, this should be the relative path to where the Datadog domain is
            appended internally. For external links, this should be the full URL
            path.
          example: /notebooks/12345
          type: string
      required:
        - name
        - url
        - category
      type: object
    MonitorAssetCategory:
      description: Indicates the type of asset this entity represents on a monitor.
      enum:
        - runbook
      example: runbook
      type: string
      x-enum-varnames:
        - RUNBOOK
    MonitorAssetResourceType:
      description: Type of internal Datadog resource associated with a monitor asset.
      enum:
        - notebook
      type: string
      x-enum-varnames:
        - NOTEBOOK
    MonitorDeviceID:
      description: ID of the device the Synthetics monitor is running on. Same as
        `SyntheticsDeviceID`.
      enum:
        - laptop_large
        - tablet
        - mobile_small
        - chrome.laptop_large
        - chrome.tablet
        - chrome.mobile_small
        - firefox.laptop_large
        - firefox.tablet
        - firefox.mobile_small
      type: string
      x-enum-varnames:
        - LAPTOP_LARGE
        - TABLET
        - MOBILE_SMALL
        - CHROME_LAPTOP_LARGE
        - CHROME_TABLET
        - CHROME_MOBILE_SMALL
        - FIREFOX_LAPTOP_LARGE
        - FIREFOX_TABLET
        - FIREFOX_MOBILE_SMALL
    MonitorDraftStatus:
      default: published
      description: >-
        Indicates whether the monitor is in a draft or published state.


        `draft`: The monitor appears as Draft and does not send notifications.

        `published`: The monitor is active and evaluates conditions and notify
        as configured.


        This field is in preview. The draft value is only available to customers
        with the feature enabled.
      enum:
        - draft
        - published
      type: string
      x-enum-varnames:
        - DRAFT
        - PUBLISHED
