{{ $dot := . }}

{{/* Conversational Search UI Templates — inert until cloned by JS */}}

{{/* Main dialog structure: floating button + overlay + chatbox */}}
<template id="conv-search-template">
    <button class="conv-search-float-btn" aria-label="Ask AI">
        <img src='{{ partial "img-resource.html" (dict "context" $dot "src" "images/svg-icons/spark-ai.svg") }}' width="18" height="18" alt="" />
        <span>Ask AI</span>
    </button>

    <div class="conv-search-overlay"></div>

    <div class="conv-search-sidebar">
        <div class="conv-search-aurora"></div>
        <div class="conv-search-header">
            <div class="conv-search-title-group">
                <div class="conv-search-logo-group">
                    <svg class="conv-search-title-icon" width="36" height="36" viewBox="0 0 192 192" fill="#8000FF" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                        <path d="M120,16h-8c0,30.88-25.12,56-56,56v8c30.88,0,56,25.12,56,56h8c0-30.88,25.12-56,56-56v-8c-30.88,0-56-25.12-56-56ZM56,104h-8c0,17.64-14.35,32-32,32v8c17.65,0,32,14.36,32,32h8c0-17.64,14.35-32,32-32v-8c-17.65,0-32-14.36-32-32Z" />
                    </svg>
                    <span class="conv-search-title">Ask AI</span>
                </div>
                <span class="tooltip-container conv-search-info-tooltip">
                    <button class="tooltip-trigger conv-search-info-btn" aria-describedby="tooltip-docs-ai-info">
                        <img src='{{ partial "img-resource.html" (dict "context" $dot "src" "images/svg-icons/info-outlined.svg") }}' width="16" height="16" alt="Info" />
                    </button>
                    <span id="tooltip-docs-ai-info" class="tooltip-content" role="tooltip">AI-generated responses may be inaccurate. Verify important info.</span>
                </span>
            </div>
            <div class="conv-search-header-actions">
                <button class="conv-search-new" aria-label="New Question" title="New Question">
                    <img src='{{ partial "img-resource.html" (dict "context" $dot "src" "images/svg-icons/plus.svg") }}' width="16" height="16" alt="" aria-hidden="true" />
                    <span>New Question</span>
                </button>
                <button class="conv-search-close" aria-label="Close">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>
        </div>
        <div class="conv-search-messages">
            {{/* Empty state is injected here by JS from the template below */}}
        </div>
        <div class="conv-search-footer">
            <div class="conv-search-input-container">
                <textarea
                    class="conv-search-input"
                    placeholder="Ask a question..."
                    rows="1"
                ></textarea>
                <button class="conv-search-send" aria-label="Send">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="12" y1="19" x2="12" y2="5"></line>
                        <polyline points="5 12 12 5 19 12"></polyline>
                    </svg>
                </button>
            </div>
            <p class="conv-search-disclaimer">Your use of this AI-powered assistant is subject to our <a href="https://www.datadoghq.com/legal/privacy/" target="_blank" rel="noopener noreferrer">Privacy Policy</a>. Please do not submit sensitive or personal information.</p>
        </div>
    </div>
</template>

{{/* Reusable empty state — cloned for initial load and "New Question" reset */}}
<template id="conv-search-empty-state">
    <div class="conv-search-empty-state">
        <div class="conv-search-empty-text">
            <h3 class="conv-search-empty-title">How can I help you today?</h3>
            <p class="conv-search-empty-subtitle">Ask me anything about Datadog documentation</p>
        </div>
        <div class="conv-search-suggestions">
            <button class="conv-search-suggestion" data-query="What is the Datadog Agent?"><span>What is the Datadog Agent?</span></button>
            <button class="conv-search-suggestion" data-query="How to define a Datadog monitor in Terraform (example)?"><span>How to define a Datadog monitor in Terraform (example)?</span></button>
            <button class="conv-search-suggestion" data-query="Which OpenTelemetry semantic conventions should I use for LLM traces in Datadog?"><span>Which OpenTelemetry semantic conventions should I use for LLM traces in Datadog?</span></button>
        </div>
    </div>
</template>

{{/* Reusable assistant message actions (thumbs/copy) */}}
<template id="conv-search-actions-template">
    <div class="conv-search-message-actions">
        <button class="conv-search-action-btn" data-action="thumbs-up" title="Good response">
            <img src='{{ partial "img-resource.html" (dict "context" $dot "src" "images/svg-icons/thumbs-up.svg") }}' width="16" height="16" alt="" aria-hidden="true" />
        </button>
        <button class="conv-search-action-btn" data-action="thumbs-down" title="Bad response">
            <img src='{{ partial "img-resource.html" (dict "context" $dot "src" "images/svg-icons/thumbs-down.svg") }}' width="16" height="16" alt="" aria-hidden="true" />
        </button>
        <button class="conv-search-action-btn" data-action="copy" title="Copy response">
            <img class="copy-icon" src='{{ partial "img-resource.html" (dict "context" $dot "src" "images/svg-icons/copy.svg") }}' width="16" height="16" alt="" aria-hidden="true" />
            <img class="check-icon" src='{{ partial "img-resource.html" (dict "context" $dot "src" "images/svg-icons/check-light.svg") }}' width="16" height="16" alt="" aria-hidden="true" style="display:none" />
        </button>
        <span class="conv-search-feedback-inline" aria-live="polite"></span>
    </div>
</template>
